# Tags for NVIDIA Config Manager deployments
# Required for render service, IPAM, and temporal workflows

# ============================================================================
# Device and Interface Tags
# ============================================================================

- name: nv-config-manager-managed
  description: Devices and interfaces managed by NVIDIA Config Manager automation
  color: 4caf50
  content_types:
    - dcim.device
    - dcim.interface
  deployment_types: [all, superpod]

- name: dns-exempt
  description: Interfaces exempt from DNS registration
  color: c0c0c0
  content_types:
    - dcim.device
    - dcim.interface
  deployment_types: [all, superpod]

- name: spectrumx
