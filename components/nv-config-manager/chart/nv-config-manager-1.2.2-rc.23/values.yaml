# =============================================================================
# SPIFFE Configuration (Service-to-Service Authentication)
# =============================================================================
# When enabled, adds Envoy sidecars to all deployments for service authentication.
# Supports two providers:
#   - spire: SPIRE + spire-controller-manager (uses CSI driver for socket)
#   - teleport: Teleport Machine ID (uses hostPath for workload API socket)
#
# Authentication modes:
#   - jwt: JWT-SVID based authentication (recommended, simpler)
#   - mtls: X.509-SVID based mutual TLS
#
# The Envoy sidecar handles authentication, apps talk plain HTTP to localhost.
# =============================================================================
spiffe:
  # Enable SPIFFE-based authentication via Envoy sidecars
  enabled: false
  # ---------------------------------------------------------------------------
  # Authentication Mode
  # ---------------------------------------------------------------------------
  # jwt: Uses JWT-SVIDs for authentication (recommended)
  #   - Simpler setup, no certificate rotation at transport layer
  #   - JWT tokens passed in Authorization header
  #   - Validated using SPIFFE trust bundle JWKS
  #
  # mtls: Uses X.509-SVIDs for mutual TLS
  #   - Transport-layer encryption and authentication
  #   - Requires certificate rotation
  # ---------------------------------------------------------------------------
  authMode: jwt # Options: jwt, mtls
  # ---------------------------------------------------------------------------
  # Provider Configuration
  # ---------------------------------------------------------------------------
  # Choose between 'spire' or 'teleport' as the SPIFFE provider
  #
  # spire:
  #   - Uses CSI driver (csi.spiffe.io) to mount workload API socket
  #   - Requires: spire-server, spire-agent, spiffe-csi-driver installed
  #   - Socket path: /spiffe-workload-api/spire-agent.sock (via CSI mount)
  #   - Uses spiffe.io/spiffe-id annotation for workload registration
  #
  # teleport:
  #   - Uses hostPath to access tbot workload API socket
  #   - Requires: tbot deployed as DaemonSet on nodes (managed externally)
  #   - Socket path: /var/run/teleport/workload-api.sock (configurable)
  # ---------------------------------------------------------------------------
  provider: spire # Options: spire, teleport
  # SPIFFE trust domain (must match your SPIRE or Teleport configuration)
  trustDomain: "config-manager.example.com"
  # ---------------------------------------------------------------------------
  # JWKS URI for validating inbound SPIFFE JWT-SVIDs
  # ---------------------------------------------------------------------------
  # Defaults to the local bundle file written by spiffe-helper.
  # Override with an HTTP(S) endpoint for direct SPIRE OIDC / Teleport JWKS:
  #   SPIRE:    https://spire-oidc.spire:8443/keys
  #   Teleport: https://teleport-proxy:3080/v1/webapi/jwt/jwks
  # ---------------------------------------------------------------------------
  jwksUri: "" # empty = /var/run/secrets/spiffe/bundle.json (spiffe-helper default)
  # ---------------------------------------------------------------------------
  # Socket Configuration
  # ---------------------------------------------------------------------------
  # The SPIFFE Workload API socket path varies by provider:
  socket:
    # Path where the socket is mounted in the container
    # For SPIRE: typically /spiffe-workload-api/spire-agent.sock
    # For Teleport: typically /var/run/teleport/workload-api.sock
    mountPath: /spiffe-workload-api
    socketFile: spire-agent.sock
    # For Teleport: hostPath where the socket exists on the node
    # Ignored for SPIRE (uses CSI driver instead)
    hostPath: /var/run/teleport
  # ---------------------------------------------------------------------------
  # SPIRE-specific Configuration
  # ---------------------------------------------------------------------------
  spire:
    # CSI driver name (standard for SPIRE)
    csiDriver: "csi.spiffe.io"
    # Custom SPIRE agent socket name (if different from default)
    agentSocketName: "spire-agent.sock"
    # ---------------------------------------------------------------------------
    # ClusterSPIFFEID Configuration
    # ---------------------------------------------------------------------------
    # When enabled, the chart deploys a ClusterSPIFFEID resource that instructs
    # spire-controller-manager to register per-component SPIFFE workload entries
    # for nv-config-manager pods.  Each pod receives:
    #   spiffe://<trustDomain>/ns/<namespace>/sa/<app-label>
    #
    # Set enabled=false if your SPIRE installation already manages workload
    # registration for nv-config-manager pods (e.g. via a site-wide ClusterSPIFFEID that
    # reads the spiffe.io/spiffe-id annotation, or per-service SpiffeID CRDs).
    # ---------------------------------------------------------------------------
    clusterSPIFFEID:
      enabled: true
      # className must match the controllerClassName configured in spire-controller-manager
      #
      # - Standard SPIRE Helm chart (spire-stack/helm-charts-hardened) default: "default-spire"
      # - Custom/bare SPIRE deployments with no --controller-class-name flag: ""
      className: ""
  # ---------------------------------------------------------------------------
  # SPIFFE Helper Configuration (for JWT mode)
  # ---------------------------------------------------------------------------
  # spiffe-helper fetches JWT-SVIDs and writes them to a file for Envoy
  # See: https://github.com/spiffe/spiffe-helper
  helper:
    image:
      repository: ghcr.io/spiffe/spiffe-helper
      tag: "0.8.0"
      pullPolicy: IfNotPresent
    # Resources for the spiffe-helper sidecar
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
  # ---------------------------------------------------------------------------
  # Local Development / Testing Options
  # ---------------------------------------------------------------------------
  # For local testing without a full SPIFFE infrastructure:
  #
  # Option 1: Disable SPIFFE entirely (recommended for local dev)
  #   spiffe:
  #     enabled: false
  #
  # Option 2: Use SPIRE in Kind/Minikube
  #   - Install spire-server and spire-agent in cluster
  #   - Install spiffe-csi-driver
  #   - Use provider: spire
  #   - See: https://spiffe.io/docs/latest/try/getting-started-k8s/
  #
  # Option 3: Mock mode with static certificates (for integration testing)
  #   spiffe:
  #     enabled: true
  #     mock:
  #       enabled: true
  #
  # Option 4: Teleport local agent
  #   - Run 'teleport start' with machine-id on your local machine
  #   - Forward socket to Kind/Minikube node
  #   - Use provider: teleport
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # RBAC Configuration for nv-config-manager-temporal Integration
  # ---------------------------------------------------------------------------
  # When nv-config-manager workloads call nv-config-manager-temporal, the sidecar injects auth headers
  # that match what mTLS does today. The inbound sidecar validates that requests
  # come from allowed namespaces before trusting these headers.
  # ---------------------------------------------------------------------------
  rbac:
    # Namespaces allowed to send requests with nv-config-manager RBAC headers
    # By default, only the nv-config-manager namespace is allowed
    # Workloads from other namespaces can still call services (if JWT is valid)
    # but won't get the nv-config-manager RBAC group
    allowedNamespaces: []
    # - nv-config-manager
    # - nv-config-manager-staging
    # If empty, defaults to global.namespace

    # Map SPIFFE ID prefixes to group names.  Matching callers get
    # the mapped group; non-matching callers only get spiffe:<name>.
    # Example:
    #   groupPrefixes:
    #     "spiffe://trust-domain/ns/nv-config-manager": "nv-config-manager"
    #     "spiffe://trust-domain/ns/dgxc": "dgxc"
    groupPrefixes: {}
  # ---------------------------------------------------------------------------
  mock:
    # Enable mock mode for testing without real SPIFFE infrastructure
    # Uses static self-signed certificates instead of dynamic SVID fetching
    enabled: false
    # Secret containing static certificates for mock mode
    certSecret: "spiffe-mock-certs"
# =============================================================================
# Network Policy Configuration (Namespace Isolation)
# =============================================================================
# Restricts ingress traffic to same-namespace communication only.
# This provides defense-in-depth by preventing lateral movement from
# compromised pods in other namespaces.
# Egress is fully open - services can reach any external endpoint.
# =============================================================================
networkPolicy:
  # Enable namespace isolation network policy
  enabled: true
  # Allow ingress from Envoy Gateway system namespace
  # Set to true if your Envoy proxy pods run in a different namespace
  allowFromGatewayNamespace: true
  gatewayNamespace: envoy-gateway-system
  # Allow ingress from LoadBalancer provider namespace
  # Set to true if using MetalLB, Cilium LB, or AWS NLB
  # Namespace defaults: metallb-system (MetalLB), kube-system (Cilium/NLB)
  allowFromLBNamespace: false
  lbNamespace: metallb-system
  # Additional namespaces to allow ingress from
  # Useful for: cnpg-system (CNPG operator needs HTTP to instance status port 8000),
  # monitoring (prometheus), logging, or other platform services
  additionalAllowedNamespaces: []
# =============================================================================
# Reference Grants (for cross-namespace service references)
# =============================================================================
referenceGrants:
  enabled: false
  # List of namespaces that are allowed to reference services in the gateway namespace
  allowedNamespaces: []
  # - other-namespace
# =============================================================================
# Kubernetes Secrets Mode (vault.method=kubernetes)
# =============================================================================
# When using vault.method=kubernetes, the installer creates secrets
# directly in the namespace before helm install. Required secrets:
#
# Created by the installer:
#   - nv-config-manager-secrets-core (nautobot-token, redis-password, nats-password)
#   - nv-config-manager-secrets-postgres (temporal, config-store credentials)
#   - nv-config-manager-secrets-network (device username/password)
#   - nv-config-manager-secrets-redfish (BMC credentials)
#   - nv-config-manager-secrets-slack (bot token)
#   - nv-config-manager-secrets-dhcp (if DHCP enabled)
#   - cluster-*-app (CNPG cluster credentials)
#
# The secret-assembler Job combines these into the nv-config-manager-ini secret.
# =============================================================================

# =============================================================================
# Custom Secrets and Configuration (Environment-Specific Extensions)
# =============================================================================
# This section allows adding custom Vault secrets and INI file snippets for
# environment-specific configuration that isn't part of the core chart.
#
# Use cases:
#   - Proprietary integrations specific to your organization
#   - Custom monitoring or observability backends
#   - Environment-specific service configurations
#   - Any INI sections needed by custom workflows or activities
#
# How it works:
#   1. Define custom Vault secrets in customConfig.vaultSecrets
#   2. ESO fetches these secrets and makes them available as JSON data
#   3. Define INI snippets that reference both values and secrets
#   4. Snippets are appended to nv-config-manager.ini
#
# Templating:
#   - For non-secret values: {{ .Values.customConfig.values.mySection.myKey }}
#   - For Vault secrets: {{ "{{" }} index (fromJson .mySecret_data) "key" {{ "}}" }}
#   
#   The double-brace escaping is needed because Helm processes first, then ESO.
# =============================================================================
customConfig:
  # Enable custom secrets and INI snippets
  enabled: false
  # ---------------------------------------------------------------------------
  # Custom Vault Secrets
  # ---------------------------------------------------------------------------
  # Each entry creates an ExternalSecret data entry that fetches a secret from
  # Vault. The secret is available in INI snippets as <name>_data JSON.
  #
  # Format:
  #   - name: <identifier>        # Used as <name>_data in ESO template
  #     path: "<vault-path>"      # Full path within secretsPath
  # ---------------------------------------------------------------------------
  vaultSecrets: []
  # Example:
  # - name: my_service
  #   path: "prod/my-service"  # Contains api_key field in Vault

  # ---------------------------------------------------------------------------
  # Custom Values (non-secrets)
  # ---------------------------------------------------------------------------
  # Non-secret configuration values that can be referenced in iniSnippets.
  # These are processed by Helm templating before ESO processes the secrets.
  # ---------------------------------------------------------------------------
  values: {}
  # Example:
  # myService:
  #   endpoint: "https://my-service.example.com"
  #   timeout: 30

  # ---------------------------------------------------------------------------
  # Custom INI Snippets
  # ---------------------------------------------------------------------------
  # Raw INI content appended to nv-config-manager.ini. These snippets are processed through
  # Helm templating first, then ESO templating.
  #
  # For values from values.yaml:
  #   {{ .Values.customConfig.values.myKey }}
  #
  # For Vault secrets (note the escaped braces for ESO):
  #   {{ "{{" }} index (fromJson .mySecret_data) "key" {{ "}}" }}
  #
  # Each snippet should be a complete INI section including [section.name] header.
  # ---------------------------------------------------------------------------
  iniSnippets: []
  # Example:
  # - |
  #   [my_service]
  #   endpoint = {{ .Values.customConfig.values.myService.endpoint }}
  #   api_key = {{ "{{" }} index (fromJson .my_service_data) "api_key" {{ "}}" }}
  #   timeout = {{ .Values.customConfig.values.myService.timeout }}
# =============================================================================
# CloudNative PostgreSQL (CNPG) Configuration
# =============================================================================
# Creates PostgreSQL clusters using CNPG operator.
# Requires: CNPG operator installed in cnpg-system namespace
# =============================================================================
cnpg:
  # Enable CNPG clusters (set false if using external PostgreSQL)
  enabled: true
  # Optional CNPG operand images for airgapped registries. imageName controls
  # PostgreSQL Cluster pods; poolerImageName is reserved for CNPG Pooler resources.
  imageName: ""
  poolerImageName: ""
  # Monitoring via PodMonitor (requires Prometheus Operator)
  monitoring:
    enabled: true
  # ---------------------------------------------------------------------------
  # Cluster Definitions
  # ---------------------------------------------------------------------------
  # Each cluster has: clusterName, database, owner, postgresql params, etc.
  # The template iterates over clusters listed in cnpg.clusterList
  # ---------------------------------------------------------------------------
  clusterList:
    - temporal
    - temporalVisibility
    - configStore
    - dhcp
  # ---------------------------------------------------------------------------
  # Backup Configuration (shared settings)
  # ---------------------------------------------------------------------------
  # CNPG supports S3, Azure Blob, and GCS for backups.
  # Configure the destination here; each cluster can enable/disable backups.
  # See: https://cloudnative-pg.io/documentation/current/backup/
  # ---------------------------------------------------------------------------
  backup:
    # Destination type: s3, azure, or gcs
    destinationType: s3
    # S3 configuration
    s3:
      endpoint: "" # e.g., "https://s3.us-west-2.amazonaws.com"
      bucket: "" # e.g., "nv-config-manager-cnpg-backups"
      path: "" # optional path prefix within bucket
      region: "" # e.g., "us-west-2"
    # Secret containing credentials (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
    credentialsSecret: cnpg-backup-credentials
    # WAL compression (gzip, bzip2, snappy, lz4, zstd)
    walCompression: gzip
    # Data compression
    dataCompression: gzip
  # Temporal database cluster
  temporal:
    enabled: true
    clusterName: cluster-temporal
    database: temporal
    owner: temporal
    instances: 3 # HA in production
    enablePDB: true
    postgresql:
      maxConnections: "400"
      sharedBuffers: "1GB"
    storage:
      size: 50Gi
      storageClass: "" # Use default storage class
    resources:
      limits:
        cpu: '4'
        memory: 8Gi
      requests:
        cpu: '1'
        memory: 4Gi
    affinity:
      # nodeSelector:  # Uncomment for production node placement
      # nv-config-manager.nvidia.com/node-type: database
      # enablePodAntiAffinity: true  # Uncomment for production
      topologyKey: kubernetes.io/hostname
    backup:
      enabled: false
      schedule: "0 0 * * *" # Daily at midnight
      retentionPolicy: "30d"
      target: preferStandby # preferStandby or primary
  # Temporal visibility database cluster
  temporalVisibility:
    enabled: true
    clusterName: cluster-temporal-visibility
    database: temporal_visibility
    owner: temporal_visibility
    instances: 3
    enablePDB: true
    postgresql:
      maxConnections: "400"
      sharedBuffers: "1GB"
    storage:
      size: 50Gi
      storageClass: ""
    resources:
      limits:
        cpu: '4'
        memory: 8Gi
      requests:
        cpu: '1'
        memory: 4Gi
    affinity:
      # nodeSelector:  # Uncomment for production node placement
      # nv-config-manager.nvidia.com/node-type: database
      # enablePodAntiAffinity: true  # Uncomment for production
      topologyKey: kubernetes.io/hostname
    backup:
      enabled: false
      schedule: "0 0 * * *"
      retentionPolicy: "30d"
      target: preferStandby
  # Config Store Service database cluster
  configStore:
    enabled: true
    clusterName: cluster-config-store
    database: config_store
    owner: config_store
    instances: 3
    enablePDB: true
    postgresql:
      maxConnections: "400"
      sharedBuffers: "2GB"
    storage:
      size: 500Gi
      storageClass: ""
    resources:
      limits:
        cpu: '4'
        memory: 16Gi
      requests:
        cpu: '2'
        memory: 8Gi
    affinity:
      # nodeSelector:  # Uncomment for production node placement
      # nv-config-manager.nvidia.com/node-type: database
      # enablePodAntiAffinity: true  # Uncomment for production
      topologyKey: kubernetes.io/hostname
    backup:
      enabled: false
      schedule: "0 0 * * *"
      retentionPolicy: "30d" # Config store may need longer retention
      target: preferStandby
  # DHCP database cluster
  dhcp:
    enabled: false
    clusterName: cluster-dhcp
    database: kea_dhcp
    owner: dhcp
    instances: 3
    enablePDB: true
    postgresql:
      maxConnections: "200"
      sharedBuffers: "512MB"
    storage:
      size: 20Gi
      storageClass: ""
    resources:
      limits:
        cpu: '2'
        memory: 4Gi
      requests:
        cpu: '500m'
        memory: 2Gi
    affinity:
      # nodeSelector:  # Uncomment for production node placement
      # nv-config-manager.nvidia.com/node-type: database
      # enablePodAntiAffinity: true  # Uncomment for production
      topologyKey: kubernetes.io/hostname
    backup:
      enabled: false
      schedule: "0 0 * * *"
      retentionPolicy: "30d"
      target: preferStandby
  # Nautobot PostgreSQL cluster (when nautobot.enabled=true)
  # Note: Nautobot is NOT in clusterList - it has special enable conditions
  nautobot:
    enabled: false # Enabled automatically when nautobot.enabled=true
    clusterName: cluster-nautobot
    database: nautobot
    owner: nautobot
    instances: 3
    enablePDB: true
    postgresql:
      maxConnections: "800"
      sharedBuffers: "2GB"
    storage:
      size: 200Gi
      storageClass: ""
    resources:
      limits:
        cpu: '8'
        memory: 32Gi
      requests:
        cpu: '2'
        memory: 16Gi
    affinity:
      # nodeSelector:  # Uncomment for production node placement
      # nv-config-manager.nvidia.com/node-type: database
      # enablePodAntiAffinity: true  # Uncomment for production
      topologyKey: kubernetes.io/hostname
    backup:
      enabled: false
      schedule: "0 0 * * *"
      retentionPolicy: "30d"
      target: preferStandby
# =============================================================================
# Local Nautobot Deployment (Optional)
# =============================================================================
# Deploy Nautobot, Redis, and NATS locally within the nv-config-manager namespace.
# Enable this for environments without full Cerebro deployment.
# When enabled, externalServices.nautobot.local should also be true.
# =============================================================================
nautobot:
  # Enable local Nautobot deployment
  enabled: false
  # ---------------------------------------------------------------------------
  # Role-Based Access Control
  # ---------------------------------------------------------------------------
  # Mapping of IdP groups to Nautobot privilege levels.  Reconciled on every
  # JWT login by nv_config_manager_auth.jwt_authentication so that promotions and demotions
  # in the IdP take effect without manual intervention.
  rbac:
    # Group/role names from the JWT groups claim (default claim: "roles") that
    # grant the user Django ``is_superuser`` + ``is_staff`` on login.  When
    # empty, the feature is disabled and existing user privileges are not
    # touched -- the bootstrap admin user remains a superuser.  Set this to a
    # non-empty list once you have established admin groups in your IdP.
    #
    # Example:
    #   superuserGroups:
    #     - nautobot-admins
    #     - nv-config-manager-admins
    superuserGroups: []
  # Nautobot Server Configuration
  server:
    replicas: 3
    resources:
      requests:
        cpu: 1
        memory: 8Gi
      limits:
        memory: 16Gi
    # Database configuration
    # Host: set to CNPG cluster service name (e.g., "cluster-nautobot-rw") or external host
    db:
      host: "cluster-nautobot-rw"
      port: 5432
      name: nautobot
    # Nautobot application settings
    debug: false
    logLevel: INFO
    # uWSGI settings
    uwsgi:
      listen: 128
      processes: 4
      threads: 4
      bufferSize: 16384
      harakiri: 1210
    # nodeSelector:  # Uncomment for production node placement
    # nv-config-manager.nvidia.com/node-type: worker
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - nautobot-server
              topologyKey: kubernetes.io/hostname
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: nautobot-server
  # Celery Worker Configuration
  celery:
    enabled: true
    replicas: 3
    resources:
      requests:
        cpu: 1
        memory: 8Gi
      limits:
        memory: 16Gi
    # Task queues
    workers:
      default:
        enabled: true
        taskQueues: "default"
        taskConcurrency: "16"
      beat:
        enabled: true
        replicas: 1 # Beat can only have 1 replica
        resources:
          requests:
            cpu: "100m"
            memory: "512Mi"
          limits:
            memory: "1Gi"
            # nodeSelector:  # Uncomment for production node placement
      # nv-config-manager.nvidia.com/node-type: worker
  # affinity:  # Uncomment for production pod distribution
  # podAntiAffinity:
  # preferredDuringSchedulingIgnoredDuringExecution:
  # - weight: 100
  # podAffinityTerm:
  # labelSelector:
  # matchExpressions:
  # - key: app.kubernetes.io/component
  # operator: In
  # values:
  # - nautobot-celery
  # topologyKey: kubernetes.io/hostname

  # NGINX sidecar for static files
  nginx:
    enabled: true
    # Worker processes - set explicitly to prevent OOM on high-CPU nodes (DGX, etc.)
    workerProcesses: 4
    image:
      registry: docker.io
      repository: nginxinc/nginx-unprivileged
      tag: "1.27"
      pullPolicy: Always
    resources:
      requests:
        cpu: ".001"
        memory: "32Mi"
      limits:
        memory: "256Mi"
  # Gateway routing - subdomain based
  gateway:
    # Hostname: nautobot.<baseHostname> (OIDC+JWT, browser access)
    hostname: "nautobot.{{ .Values.gateway.baseHostname }}"
    # Hostname: svc-nautobot.<baseHostname> (JWT-only, CLI/machine access)
    svcHostname: "svc-nautobot.{{ .Values.gateway.baseHostname }}"
    # Optional: restrict access to specific groups (Azure AD group UUIDs)
    allowedGroups: []
    # -------------------------------------------------------------------------
    # Auth Bypass Paths
    # -------------------------------------------------------------------------
    # Nautobot supports multiple auth methods:
    #   1. OIDC/JWT (browser users via SSO)
    #   2. Native API tokens (Authorization: Token <token>)
    #   3. Remote user auth (trusts X-Auth-Request-User header from reverse proxy)
    #
    # For /api/ paths:
    #   - OIDC redirect is disabled (no login prompt)
    #   - JWT is optional but claims extracted if present (for remote user auth)
    #   - Nautobot handles its own token auth for requests without JWT
    #
    # This enables both SSO users (with JWT) and API clients (with native tokens)
    # to access the same endpoints.
    # -------------------------------------------------------------------------
    authBypass:
      enabled: true
      paths:
        - /api/
  # Ingress (optional, for direct access)
  ingress:
    enabled: false
    hostname: ""
    ingressClassName: nginx
  # Init job settings
  initJob:
    enabled: true
    singleInit: true # Run migrations, collect static, load bootstrap in single job
  # Persistence
  persistence:
    staticFiles:
      enabled: true
      size: 1Gi
    mediaFiles:
      enabled: false
      size: 1Gi
  # Metrics and monitoring
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  # ---------------------------------------------------------------------------
  # Run the built-in bootstrap job after migrations (loads tags, statuses, roles, etc.).
  # Independent of customJobs: bootstrap runs from image jobs when no PVC is used.
  bootstrap:
    enabled: true
  # Custom Jobs Configuration
  # ---------------------------------------------------------------------------
  # Mount custom Nautobot jobs from a ConfigMap or hostPath.
  # Jobs are mounted to $NAUTOBOT_ROOT/jobs/ (default: /opt/nautobot/jobs/)
  # See: https://docs.nautobot.com/projects/core/en/stable/development/jobs/installation/#manual-installation-via-jobs_root
  #
  # The jobs must contain valid Job classes (subclasses of nautobot.apps.jobs.Job)
  # and register them using register_jobs(). After deployment, run post_upgrade
  # and enable the jobs in the Nautobot UI.
  # ---------------------------------------------------------------------------
  customJobs:
    # Enable custom jobs mounting
    # Jobs are mounted from a PersistentVolumeClaim that the customer populates.
    # This works for airgapped installs with no size limits.
    #
    # Workflow:
    #   1. Create PVC: kubectl apply -f custom-jobs-pvc.yaml
    #   2. Populate with jobs (kubectl cp, job, or pre-provisioned storage)
    #   3. Enable here and deploy
    #
    # See: https://docs.nautobot.com/projects/core/en/stable/development/jobs/installation/
    enabled: false
    # Name of the PVC containing custom jobs
    # The PVC must exist and contain the jobs directory structure
    pvcName: nautobot-custom-jobs
    # Storage class for auto-created PVC (if createPvc is true)
    # Leave empty to use the cluster default storage class
    storageClass: ""
    # Access mode for auto-created PVC
    accessMode: ReadWriteOnce
    # Size of auto-created PVC
    size: 1Gi
    # Automatically create the PVC (set false if using pre-existing PVC)
    createPvc: false
    # Optional node selector for Nautobot pods that mount the jobs PVC.
    # Use this with ReadWriteOnce PVCs to keep replacement pods on the node
    # where the jobs volume can attach.
    nodeSelector: {}
# =============================================================================
# Local NATS (when externalServices.nats.local=true or nautobot.enabled=true)
# =============================================================================
nautobotNats:
  enabled: false # Auto-enabled when nautobot.enabled=true
  # JetStream configuration
  jetstream:
    enabled: true
    # JetStream storage limits
    maxMem: 1G # Max memory storage
    maxFile: 10G # Max file storage (increase for production or use nats-ready binary)
  # Max payload size (8MB)
  maxPayload: 8388608
  # NATS resources
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      memory: 1Gi
      # nodeSelector:  # Uncomment for production node placement
    # nv-config-manager.nvidia.com/node-type: control-plane
  # Account configuration
  accounts:
    nvConfigManager:
      enabled: true
    nautobot:
      enabled: true
  # nats-ready init container configuration
  # This creates the JetStream streams needed by nautobot and nv-config-manager services
  natsReady:
    enabled: true
    # Use nats CLI instead of nats-ready binary (for local dev with smaller streams)
    useNatsCli: false
    # Max bytes per stream (nv-config-manager + nautobot). Must fit within jetstream.maxFile.
    # Total storage needed: 2 x streamMaxBytes (both streams)
    # Default maxFile is 10G, so 4GB per stream (8GB total) fits safely.
    streamMaxBytes: 4294967296 # 4GB
    natsUrl: "nats://nats:4222"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
# =============================================================================
# Monitoring Configuration (Prometheus Operator PodMonitors)
# =============================================================================
# PodMonitors for scraping NVIDIA Config Manager services. Requires Prometheus Operator CRDs.
# Enable through installer infrastructure.monitoring.enabled
#
# Service-specific configuration (selectors, ports, paths) is defined in the
# podmonitors.yaml template. Values here control only enabled/disabled state.
# =============================================================================
monitoring:
  # Master switch for all monitoring resources
  enabled: false
  # External Grafana URL.
  # When set, the UI splash page links to this URL. 
  grafanaUrl: ""
  # Prometheus namespace (for network policy to allow scraping)
  prometheus:
    namespace: monitoring
  # PodMonitor configuration
  # ---------------------------------------------------------------------------
  # Probes (Blackbox Exporter)
  # ---------------------------------------------------------------------------
  # Probes use the Prometheus Blackbox Exporter to perform external HTTP checks
  # against service endpoints through the gateway. This validates end-to-end
  # connectivity including TLS termination and routing.
  #
  # Requirements:
  #   - Blackbox Exporter deployed in the cluster
  #   - Prometheus Operator CRDs installed
  #   - Services must be accessible via gateway hostnames
  # ---------------------------------------------------------------------------
  # Probes: each probe is enabled when probes.enabled AND the target service is enabled
  probes:
    enabled: false
    # URL of the Blackbox Exporter service (required when enabled)
    # e.g., "blackbox-exporter.monitoring.svc.cluster.local:9115"
    blackboxExporterUrl: ""
    # Optional prefix applied to every probe's `jobName` (the Prometheus
    # `job` label). Final job names are `<jobNamePrefix><componentName>-probe`
    # where `<componentName>` is derived from the Helm release (e.g.
    # `<release>-render`, `<release>-temporal-api`). Override
    # per-environment when probes need to match a site-specific alerting /
    # dashboard regex.
    jobNamePrefix: ""
  # PodMonitors: each PodMonitor is enabled when podMonitors.enabled AND the target service is enabled
  podMonitors:
    enabled: false
    # Default scrape interval
    interval: 30s
    # Default scrape timeout
    scrapeTimeout: 10s
    # Per-endpoint metricRelabelings for global.customLabels are rendered in monitoring.yaml (job-based).
# =============================================================================
# Local Observability Stack (subcharts)
# =============================================================================
# Standalone Prometheus (storage only) + Grafana + Loki + Grafana Alloy are
# pulled in as Helm subchart dependencies. They are DISABLED by default
# because:
#   * Grafana is AGPL-licensed and is intentionally excluded from production
#     installs (production deployments should keep grafana.enabled=false on their
#     kube-prometheus-stack release).
#   * The Alloy DaemonSet mounts /var/log/pods (hostPath) to tail pod logs,
#     which is blocked by Kyverno in shared clusters (nv-config-manager-qa, prod).
#
# Enable the whole stack together for LOCAL DEV / KIND / AIRGAPPED DEMOS ONLY
# by toggling "Enable local observability stack" in the TUI installer (or by
# layering deploy/helm/values-observability.yaml on top of your values).
#
# Architecture: Alloy watches the PodMonitor / ServiceMonitor / Probe CRs
# (via prometheus.operator.* components) and scrapes the targets, then
# remote_writes to the standalone Prometheus. No Prometheus Operator pod
# runs in this path -- Alloy IS the operator-equivalent.
#
# Note: prometheus-operator-crds is NOT a subchart -- the installer
# pre-installs it as a sibling Helm release so the parent chart's
# PodMonitor / Probe templates can reference its CRDs cleanly. See the
# long note in deploy/helm/Chart.yaml.
#
# DO NOT enable this in the same cluster as a separately managed production Prometheus Operator stack.
# =============================================================================
prometheus:
  enabled: false
grafana:
  enabled: false
loki:
  enabled: false
alloy:
  enabled: false
