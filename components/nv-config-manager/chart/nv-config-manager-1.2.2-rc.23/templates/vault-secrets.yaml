    kind: SecretStore
  target:
    name: bmc-creds
    template:
      engineVersion: v2
      type: Opaque
      data:
        bmc-creds.json: |
          {{ "{{ index (fromJson .bmc_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "bmc" "key" "credsJson") }}{{ "\" }}" }}
  data:
    - secretKey: bmc_data
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "bmc") }}"
  refreshInterval: 300s
---
{{- end }}

# CNPG backup S3 credentials (optional, for ESO-managed backup credentials)
{{- if and (.Values.cnpg.enabled) (.Values.cnpg.backup.enabled) (.Values.secrets.vault.paths.cnpgBackup) (.Values.secrets.vault.paths.cnpgBackup.path) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-backup-credentials-eso
  namespace: {{ .Values.global.namespace }}
spec:
  secretStoreRef:
    name: {{ $vaultSecretStoreName }}
    kind: SecretStore
  target:
    name: {{ .Values.cnpg.backup.credentialsSecret | default "cnpg-backup-credentials" }}
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "cnpgBackup") }}"
        property: {{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "cnpgBackup" "key" "accessKeyId") }}
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "cnpgBackup") }}"
        property: {{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "cnpgBackup" "key" "accessSecretKey") }}
  refreshInterval: 300s
{{- end }}

{{- if and $appEso .Values.secrets.vault.configSecrets.enabled (or .Values.secrets.vault.configSecrets.sites .Values.secrets.vault.configSecrets.regions) }}
# ExternalSecret for network/site config secrets
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: network-config-secrets
  namespace: {{ .Values.global.namespace }}
spec:
  secretStoreRef:
    name: {{ $vaultNetworkSecretStoreName }}
    kind: SecretStore
  target:
    name: {{ include "nv-config-manager.networkSecretsName" . }}
    template:
      engineVersion: v2
      type: Opaque
      data:
        config-secrets.ini: |
          {{- range $site := .Values.secrets.vault.configSecrets.sites }}
          [site.{{ $site.name }}]
          {{ "{{" }}- range $k, $v := (fromJson (index $ "config_secrets_{{ $site.name }}_data")) {{ "}}" }}
          {{ "{{" }} $k {{ "}}" }}: {{ "{{" }} $v | indent 2 {{ "}}" }}
          {{ "{{" }} end -{{ "}}" }}

          {{- end }}
          {{- range $region := .Values.secrets.vault.configSecrets.regions }}
          [region.{{ $region.name }}]
          {{ "{{" }}- range $k, $v := (fromJson (index $ "config_secrets_{{ $region.name }}_data")) {{ "}}" }}
          {{ "{{" }} $k {{ "}}" }}: {{ "{{" }} $v | indent 2 {{ "}}" }}
          {{ "{{" }} end -{{ "}}" }}

          {{- end }}
  data:
    {{- range $site := .Values.secrets.vault.configSecrets.sites }}
    - secretKey: config_secrets_{{ $site.name }}_data
      remoteRef:
        key: {{ required (printf "configSecrets.sites[].path is required for site %s" $site.name) $site.path | quote }}
    {{- end }}
    {{- range $region := .Values.secrets.vault.configSecrets.regions }}
    - secretKey: config_secrets_{{ $region.name }}_data
      remoteRef:
        key: {{ required (printf "configSecrets.regions[].path is required for region %s" $region.name) $region.path | quote }}
    {{- end }}
  refreshInterval: 300s
---
{{- end }}
{{- if $appEso }}
# ExternalSecret for unified NVIDIA Config Manager INI configuration
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "nv-config-manager.componentName" (dict "root" . "component" "unified-config") }}
  namespace: {{ .Values.global.namespace }}
spec:
  secretStoreRef:
    name: {{ $vaultSecretStoreName }}
    kind: SecretStore
  target:
    name: {{ include "nv-config-manager.iniSecretName" . }}
    template:
      engineVersion: v2
      type: Opaque
      data:
        nv-config-manager.ini: |
          # =================================================================
          # NVIDIA Config Manager Unified Configuration
          # Auto-generated from Helm chart
          # Environment: {{ .Values.global.environment }}
          # =================================================================

          {{ include "nv-config-manager.authIniSections" . | nindent 10 }}

          # -----------------------------------------------------------------
          # Nautobot Configuration (shared by all services)
          # -----------------------------------------------------------------
          [nautobot]
          server = {{ include "nv-config-manager.nautobotServer" . }}
          public_url = {{ include "nv-config-manager.nautobotPublicUrl" . }}
          token = {{ "{{ index (fromJson .nautobot_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "nautobot" "key" "token") }}{{ "\" }}" }}
          version = {{ .Values.externalServices.nautobot.version }}
          {{- if .Values.externalServices.nautobot.maxWorkers }}
          max_workers = {{ .Values.externalServices.nautobot.maxWorkers }}
          {{- end }}
          {{- if .Values.externalServices.nautobot.retries }}
          retries = {{ .Values.externalServices.nautobot.retries }}
          {{- end }}
          verify = {{ .Values.externalServices.nautobot.verify }}
          cache_refresh_interval = {{ .Values.externalServices.nautobot.cacheRefreshInterval }}
          cache_ttl = {{ .Values.externalServices.nautobot.cacheTtl }}

          # -----------------------------------------------------------------
          # NATS Configuration (message queue for render service)
          # -----------------------------------------------------------------
          [nats]
          server = {{ include "nv-config-manager.natsServer" . }}
          queue = {{ .Values.externalServices.nats.queue }}
          auth_method = {{ .Values.externalServices.nats.authMethod }}
          {{- if eq .Values.externalServices.nats.authMethod "password" }}
          user = {{ .Values.externalServices.nats.user }}
          password = {{ "{{ index (fromJson .nautobot_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "nautobot" "key" "natsPassword") }}{{ "\" }}" }}
          {{- else if eq .Values.externalServices.nats.authMethod "JWT" }}
          creds_path = {{ .Values.externalServices.nats.credsPath }}
          {{- end }}
          local = {{ .Values.externalServices.nats.local }}
          config_manager_stream = {{ .Values.externalServices.nats.streams.configManager.name }}
          config_manager_subjects = {{ join "," .Values.externalServices.nats.streams.configManager.subjects }}
          render_change_stream = {{ .Values.externalServices.nats.streams.configManager.name }}
          render_change_subject = {{ .Values.externalServices.nats.streams.configManager.renderChangeSubject }}
          device_change_stream = {{ .Values.externalServices.nats.streams.configManager.name }}
          device_change_subject = {{ .Values.externalServices.nats.streams.configManager.deviceChangeSubject }}
          archive_stream = {{ .Values.externalServices.nats.streams.configManager.name }}
          archive_subject = {{ .Values.externalServices.nats.streams.configManager.archiveSubject }}
          nautobot_stream = {{ .Values.externalServices.nats.streams.nautobot.name }}
          nautobot_subjects = {{ join "," .Values.externalServices.nats.streams.nautobot.subjects }}
          nautobot_subject = {{ .Values.externalServices.nats.streams.nautobot.subject }}

          # -----------------------------------------------------------------
          # Redis Configuration (shared by all services)
          # -----------------------------------------------------------------
          [redis]
          host = {{ include "nv-config-manager.redisHost" . }}
          port = {{ .Values.externalServices.redis.port }}
          db = {{ .Values.externalServices.redis.db }}
          lock_db = {{ .Values.externalServices.redis.lockDb }}
          ssl = {{ .Values.externalServices.redis.ssl }}
          socket_timeout = {{ .Values.externalServices.redis.socketTimeout }}
          socket_connect_timeout = {{ .Values.externalServices.redis.socketConnectTimeout }}
          {{- if .Values.externalServices.redis.passwordAuth }}
          password = {{ "{{ index (fromJson .redis_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "redis" "key" "password") }}{{ "\" }}" }}
          {{- end }}


          # -----------------------------------------------------------------
          # Config Store Database Configuration
          # -----------------------------------------------------------------
          [config_store]
          database_host = {{ tpl (required "externalServices.postgres.configStore.host is required" .Values.externalServices.postgres.configStore.host) . }}
          database_port = {{ .Values.externalServices.postgres.port }}
          database = {{ .Values.externalServices.postgres.configStore.database }}
          database_user = {{ "{{ index (fromJson .postgres_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "postgres" "key" "configStoreUser") }}{{ "\" }}" }}
          database_password = {{ "{{ index (fromJson .postgres_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "postgres" "key" "configStorePassword") }}{{ "\" }}" }}

          # -----------------------------------------------------------------
          # Config Store API Configuration
          # -----------------------------------------------------------------
          [config_store.api]
          # CORS origins allowed to make cross-origin requests with credentials
          cors_origins = https://{{ .Values.gateway.baseHostname }}
          {{- if .Values.configStore.gateway.api.allowedGroups }}
          allowed_groups = {{ .Values.configStore.gateway.api.allowedGroups | join "," }}
          {{- end }}

          # -----------------------------------------------------------------
          # Config Store Client Configuration (for all services to fetch configs)
          # -----------------------------------------------------------------
          [config_store.client]
          # Internal endpoint for service-to-service calls (within cluster)
          # Uses sidecar port when auth sidecars are enabled for header injection
          api_service = http://{{ $configStoreName }}-api:{{ $internalPort }}
          # External URL for user-facing links (markdown, nautobot references, etc.)
          api_url = https://{{ tpl .Values.configStore.gateway.api.hostname . }}
          ui_url = https://{{ .Values.gateway.baseHostname }}
          # Set to true for internal cluster communication (uses api_service)
          # Set to false for external mTLS communication (uses api_url)
          use_internal_endpoint = {{ .Values.configStore.client.useInternalEndpoint | default true }}
          verify = {{ .Values.configStore.client.verify | default true }}

          {{- if .Values.temporal.enabled }}
          # -----------------------------------------------------------------
          # Temporal/Workflow Configuration
          # -----------------------------------------------------------------
          [temporal]
          # Internal: Temporal gRPC frontend (for workers, SDK clients)
          grpc_service = {{ $temporalName }}-frontend-service.{{ .Values.global.namespace }}.svc:{{ .Values.temporal.services.frontend.port }}
          # Internal: NVIDIA Config Manager Temporal API (for internal service calls)
          # Uses sidecar port when auth sidecars are enabled for header injection
          api_service = http://{{ $temporalName }}-api:{{ $internalPort }}
          # External: Gateway URLs for user-facing links
          api_url = https://{{ tpl .Values.temporal.gateway.api.hostname . }}
          ui_url = https://{{ .Values.gateway.baseHostname }}
          # Set to true for internal cluster communication (uses api_service)
          # Set to false for external mTLS communication (uses api_url)
          use_internal_endpoint = {{ .Values.temporal.client.useInternalEndpoint | default true }}

          [temporal.elasticsearch]
          local = {{ .Values.externalServices.elasticsearch.local }}
          server = {{ tpl .Values.externalServices.elasticsearch.server . }}
          {{- if .Values.externalServices.elasticsearch.domain }}
          domain = {{ .Values.externalServices.elasticsearch.domain }}
          {{- end }}

          {{- if .Values.temporal.air.orgId }}
          [temporal.air]
          ssa_client_id = {{ "{{ index (fromJson .air_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "air" "key" "ssaClientId") }}{{ "\" }}" }}
          ssa_client_secret = {{ "{{ index (fromJson .air_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "air" "key" "ssaClientSecret") }}{{ "\" }}" }}
          org_id = {{ .Values.temporal.air.orgId }}
          air_api_url = {{ .Values.temporal.air.airApiUrl }}
          air_node_user = {{ .Values.temporal.air.airNodeUser }}
          air_node_password = {{ .Values.temporal.air.airNodePassword }}
          {{- end }}

          # -----------------------------------------------------------------
          # Temporal API Configuration (REST API for workflow operations)
          # -----------------------------------------------------------------
          [temporal.api]
          # CORS origins allowed to make cross-origin requests with credentials
          cors_origins = https://{{ .Values.gateway.baseHostname }}
          {{- if .Values.temporal.gateway.api.allowedGroups }}
          allowed_groups = {{ .Values.temporal.gateway.api.allowedGroups | join "," }}
          {{- end }}

          # -----------------------------------------------------------------
          # Device Credentials (for Temporal workflows)
          # -----------------------------------------------------------------
          [device]
          username = {{ "{{ index (fromJson .network_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "network" "key" "user") }}{{ "\" }}" }}
          password = {{ "{{ index (fromJson .network_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "network" "key" "password") }}{{ "\" }}" }}
          {{- end }}

          {{- if .Values.temporal.redfish.enabled }}
          # -----------------------------------------------------------------
          # Redfish/BMC Configuration (for Temporal workflows)
          # -----------------------------------------------------------------
          [redfish]
          lenovo_default_user = {{ "{{ index (fromJson .redfish_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "redfish" "key" "lenovoDefaultUser") }}{{ "\" }}" }}
          lenovo_default_password = {{ "{{ index (fromJson .redfish_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "redfish" "key" "lenovoDefaultPassword") }}{{ "\" }}" }}
          lenovo_config_manager_password = {{ "{{ index (fromJson .redfish_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "redfish" "key" "lenovoConfigManagerPassword") }}{{ "\" }}" }}
          bluefield_default_user = {{ "{{ index (fromJson .redfish_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "redfish" "key" "bluefieldDefaultUser") }}{{ "\" }}" }}
          bluefield_default_password = {{ "{{ index (fromJson .redfish_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "redfish" "key" "bluefieldDefaultPassword") }}{{ "\" }}" }}
          bluefield_config_manager_password = {{ "{{ index (fromJson .redfish_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "redfish" "key" "bluefieldConfigManagerPassword") }}{{ "\" }}" }}
          {{- end }}

          # -----------------------------------------------------------------
          # Render Service Configuration
          # -----------------------------------------------------------------
          {{- if .Values.renderService.enabled }}
          [render]
          # Internal endpoint for service-to-service calls
          # Uses sidecar port when auth sidecars are enabled for header injection
          api_service = http://{{ $renderName }}-api:{{ $internalPort }}
          # External URL for user-facing links
          api_url = https://{{ tpl .Values.renderService.gateway.hostname . }}
          # Set to true for internal cluster communication (uses api_service)
          # Set to false for external mTLS communication (uses api_url)
          use_internal_endpoint = {{ .Values.renderService.client.useInternalEndpoint | default true }}
          {{- if .Values.renderService.gateway.allowedGroups }}
          allowed_groups = {{ .Values.renderService.gateway.allowedGroups | join "," }}
          {{- end }}
          {{- end }}

          # -----------------------------------------------------------------
          # Aggregate Environment Configuration
          # -----------------------------------------------------------------
          [aggregate]
          is_aggregate_environment = {{ .Values.global.aggregate }}

          {{- $slackChannel := dig "slack" "channel" "" .Values.externalServices }}
          {{- if $slackChannel }}
          # -----------------------------------------------------------------
          # Slack Configuration (shared notifications)
          # -----------------------------------------------------------------
          [slack]
          bot_token = {{ "{{ index (fromJson .slack_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "slack" "key" "token") }}{{ "\" }}" }}
          channel_name = {{ $slackChannel }}
          {{- end }}

          {{- if .Values.networkDhcp.enabled }}
          # -----------------------------------------------------------------
          # DHCP Service Configuration
          # -----------------------------------------------------------------
          [dhcp]
          # Internal endpoint for service-to-service calls
          # Uses sidecar port when auth sidecars are enabled for header injection
          api_service = http://{{ $dhcpName }}-internal:{{ $internalPort }}
          # External URL for user-facing links
          api_url = https://{{ tpl .Values.networkDhcp.gateway.hostname . }}
          {{- if .Values.networkDhcp.gateway.allowedGroups }}
          allowed_groups = {{ .Values.networkDhcp.gateway.allowedGroups | join "," }}
          {{- end }}

          [dhcp.kea]
          server = {{ $dhcpName }}-internal
          port = 8000

          [dhcp.lease_db]
          local = false
          host = {{ tpl .Values.externalServices.postgres.dhcp.host . }}
          port = {{ .Values.externalServices.postgres.port }}
          database = {{ .Values.externalServices.postgres.dhcp.database }}
          user = {{ "{{ index (fromJson .leasedb_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "postgres" "key" "dhcpUser") }}{{ "\" }}" }}
          password = {{ "{{ index (fromJson .leasedb_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "postgres" "key" "dhcpPassword") }}{{ "\" }}" }}
          {{- end }}

          {{- if .Values.networkZtp.enabled }}
          # -----------------------------------------------------------------
          # ZTP Service Configuration
          # -----------------------------------------------------------------
          [ztp]
          # Internal endpoint for service-to-service calls
          # Uses sidecar port when auth sidecars are enabled for header injection
          api_service = http://{{ $ztpName }}-api:{{ $internalPort }}
          # External URL for user-facing links
          api_url = https://{{ tpl .Values.networkZtp.gateway.hostname . }}
          # User domain for workflow context
          user_domain = {{ .Values.global.environment }}.{{ .Values.global.baseDomain }}
          # Set to true for internal cluster communication (uses api_service)
          # Set to false for external mTLS communication (uses api_url)
          use_internal_endpoint = {{ .Values.networkZtp.client.useInternalEndpoint | default true }}
          {{- if .Values.networkZtp.gateway.allowedGroups }}
          allowed_groups = {{ .Values.networkZtp.gateway.allowedGroups | join "," }}
          {{- end }}

          {{- end }}

          {{- if and .Values.temporal.enabled (index .Values.secrets.vault.paths "jira") }}
          # -----------------------------------------------------------------
          # Jira Configuration (for DiagnosticsWorkflow)
          # -----------------------------------------------------------------
          [jira]
          base_url  = {{ "{{ index (fromJson .jira_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "jira" "key" "baseUrl") }}{{ "\" }}" }}
          api_token = {{ "{{ index (fromJson .jira_data) \"" }}{{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "jira" "key" "apiToken") }}{{ "\" }}" }}
          {{- end }}

          {{- if and .Values.customConfig.enabled .Values.customConfig.iniSnippets }}
          # -----------------------------------------------------------------
          # Custom Configuration Snippets
          # -----------------------------------------------------------------
          # These snippets are defined in customConfig.iniSnippets and may
          # reference custom vault secrets from customConfig.vaultSecrets
          # -----------------------------------------------------------------
          {{- range .Values.customConfig.iniSnippets }}
{{ tpl . $ | indent 10 }}
          {{- end }}
          {{- end }}

  data:
    # Fetch nautobot secrets
    - secretKey: nautobot_data
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "nautobot") }}"
    
    # Fetch redis secrets
    {{- if .Values.externalServices.redis.passwordAuth }}
    - secretKey: redis_data
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "redis") }}"
    {{- end }}
    
    # Fetch postgres secrets
    - secretKey: postgres_data
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "postgres") }}"
    
    {{- if (dig "slack" "channel" "" .Values.externalServices) }}
    # Fetch slack secrets (used by multiple services)
    - secretKey: slack_data
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "slack") }}"
    {{- end }}
    
    {{- if .Values.temporal.enabled }}
    # Fetch network/device secrets
    - secretKey: network_data
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "network") }}"
    
    # Fetch air secrets (if configured)
    {{- if .Values.temporal.air.orgId }}
    - secretKey: air_data
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "air") }}"
    {{- end }}
    {{- end }}

    {{- if .Values.temporal.redfish.enabled }}
    # Fetch redfish secrets
    - secretKey: redfish_data
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "redfish") }}"
    {{- end }}
    
    {{- if .Values.networkDhcp.enabled }}
    # Fetch DHCP lease database secrets (from postgres path, not separate dhcp path)
    - secretKey: leasedb_data
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "postgres") }}"
    {{- end }}
    
    {{- if and .Values.temporal.enabled (index .Values.secrets.vault.paths "jira") }}
    # Fetch jira secrets (for DiagnosticsWorkflow)
    - secretKey: jira_data
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "jira") }}"
    {{- end }}
    
    {{- if and .Values.customConfig.enabled .Values.customConfig.vaultSecrets }}
    # Fetch custom secrets (environment-specific configuration)
    {{- range .Values.customConfig.vaultSecrets }}
    - secretKey: {{ .name }}_data
      remoteRef:
        key: {{ required (printf "customConfig.vaultSecrets[].path is required for secret %s" .name) .path | quote }}
    {{- end }}
    {{- end }}
  
  refreshInterval: 300s
{{- end }}

# =============================================================================
# KEDA Prometheus mTLS Certificates (for secure Prometheus access)
# =============================================================================
# When using KEDA autoscaling with a secured Prometheus (like Panoptes/Mimir),
# these certificates enable mTLS authentication for the KEDA Prometheus scaler.
#
# The secret must contain:
#   - ca.crt: CA certificate for verifying Prometheus server
#   - tls.crt: Client certificate for authentication
#   - tls.key: Client private key
# =============================================================================
{{- if and .Values.renderService.enabled .Values.renderService.autoscaling.enabled .Values.renderService.autoscaling.prometheus.tls.enabled }}
{{- if .Values.secrets.vault.paths.kedaPrometheusCerts }}
{{- if .Values.secrets.vault.paths.kedaPrometheusCerts.path }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keda-prometheus-certs-eso
  namespace: {{ .Values.global.namespace }}
spec:
  secretStoreRef:
    name: {{ $vaultSecretStoreName }}
    kind: SecretStore
  target:
    name: {{ .Values.renderService.autoscaling.prometheus.tls.secretName | default "keda-prometheus-certs" }}
    creationPolicy: Owner
  data:
    - secretKey: {{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "kedaPrometheusCerts" "key" "caCert") }}
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "kedaPrometheusCerts") }}"
        property: {{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "kedaPrometheusCerts" "key" "caCert") }}
    - secretKey: {{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "kedaPrometheusCerts" "key" "tlsCert") }}
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "kedaPrometheusCerts") }}"
        property: {{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "kedaPrometheusCerts" "key" "tlsCert") }}
    - secretKey: {{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "kedaPrometheusCerts" "key" "tlsKey") }}
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "kedaPrometheusCerts") }}"
        property: {{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "kedaPrometheusCerts" "key" "tlsKey") }}
  refreshInterval: 300s
{{- end }}
{{- end }}
{{- end }}
{{- end }}
