# Git repository tokens (for Nautobot git sync, e.g. Prismo)
{{- if .Values.externalServices.nautobot.local }}
{{- range $gt := .Values.secrets.vault.paths.gitTokens }}
{{- if $gt.path }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $gt.secretName }}-eso
  namespace: {{ $.Values.global.namespace }}
spec:
  secretStoreRef:
    name: {{ $vaultSecretStoreName }}
    kind: SecretStore
  target:
    name: {{ $gt.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: {{ $gt.path | quote }}
        property: token
    {{- if $gt.hasUsername }}
    - secretKey: username
      remoteRef:
        key: {{ $gt.path | quote }}
        property: username
    {{- end }}
  refreshInterval: 300s
{{- end }}
{{- end }}
