# =============================================================================
# Vault/ESO Secrets for NVIDIA Config Manager
# =============================================================================
# This template creates all secrets needed by NVIDIA Config Manager services using ESO:
#
#   - SecretStores: Connect ESO to Vault/OpenBao
#   - Redis Password: For local Redis deployment
#   - CNPG Credentials: For PostgreSQL clusters (temporal, config-store, etc.)
#   - BMC Credentials: For Temporal BMC workflows
#   - Network Config: Site/region-specific secrets
#   - nv-config-manager-ini: Unified configuration file with embedded secrets
#
# ESO resources render when secrets.method=eso (all) or vault-agent (operator subset).
# =============================================================================

{{- include "nv-config-manager.validateSecrets" . -}}
{{- $appEso := eq .Values.secrets.method "eso" -}}
{{- $vaEso := and (eq .Values.secrets.method "vault-agent") .Values.secrets.vaultAgent.esoForOperators -}}
{{- $anyEso := or $appEso $vaEso -}}
{{ if $anyEso }}
---
# SecretStore for connecting to Vault/OpenBao
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ $vaultSecretStoreName }}
  namespace: {{ .Values.global.namespace }}
spec:
  provider:
    vault:
      auth:
        {{- if .Values.secrets.vault.tokenAuth.enabled }}
        # Token-based auth (for local OpenBao/dev environments)
        tokenSecretRef:
          name: {{ .Values.secrets.vault.tokenAuth.secretName | default "vault-token" }}
          key: token
        {{- else }}
        # JWT/Kubernetes auth (for production Vault)
        jwt:
          kubernetesServiceAccountToken:
            audiences:
            - {{ .Values.secrets.vault.server }}:443
            serviceAccountRef:
              name: {{ include "nv-config-manager.serviceAccountName" . }}
              namespace: {{ .Values.global.namespace }}
          path: {{ .Values.secrets.vault.mountPath }}
          role: {{ .Values.secrets.vault.role }}
        {{- end }}
      {{- if and .Values.secrets.vault.namespace (not .Values.secrets.vault.tokenAuth.enabled) }}
      namespace: {{ .Values.secrets.vault.namespace }}
      {{- end }}
      path: {{ .Values.secrets.vault.secretsPath | default (printf "%s/secrets" .Values.secrets.vault.namespace) }}
      server: {{ .Values.secrets.vault.server }}
      version: v2
---
# SecretStore for config secrets (sites/regions)
# Uses configSecretsPath if set, otherwise falls back to secretsPath.
# This allows config secrets to be stored in a different KV engine than application secrets.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ $vaultNetworkSecretStoreName }}
  namespace: {{ .Values.global.namespace }}
spec:
  provider:
    vault:
      auth:
        {{- if .Values.secrets.vault.tokenAuth.enabled }}
        # Token-based auth (for local OpenBao/dev environments)
        tokenSecretRef:
          name: {{ .Values.secrets.vault.tokenAuth.secretName | default "vault-token" }}
          key: token
        {{- else }}
        # JWT/Kubernetes auth (for production Vault)
        jwt:
          kubernetesServiceAccountToken:
            audiences:
            - {{ .Values.secrets.vault.server }}:443
            serviceAccountRef:
              name: {{ include "nv-config-manager.serviceAccountName" . }}
              namespace: {{ .Values.global.namespace }}
          path: {{ .Values.secrets.vault.mountPath }}
          role: {{ .Values.secrets.vault.role }}
        {{- end }}
      {{- if and .Values.secrets.vault.namespace (not .Values.secrets.vault.tokenAuth.enabled) }}
      namespace: {{ .Values.secrets.vault.namespace }}
      {{- end }}
      path: {{ .Values.secrets.vault.configSecretsPath | default .Values.secrets.vault.secretsPath | default (printf "%s/secrets" .Values.secrets.vault.namespace) }}
      server: {{ .Values.secrets.vault.server }}
      version: v2

# =============================================================================
# Core Application Secrets
# =============================================================================
# These secrets match the names expected by the kubernetes method so all
# templates can reference them consistently regardless of vault.method.
# =============================================================================

{{- if $appEso }}
# Nautobot API token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nautobot-token-eso
  namespace: {{ .Values.global.namespace }}
spec:
  secretStoreRef:
    name: {{ $vaultSecretStoreName }}
    kind: SecretStore
  target:
    name: nautobot-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: "{{ include "nv-config-manager.vault.secretPath" (dict "root" . "secret" "nautobot") }}"
        property: {{ include "nv-config-manager.vault.keyName" (dict "root" . "secret" "nautobot" "key" "token") }}
  refreshInterval: 300s
{{- end }}

# Nautobot Django secret key and admin credentials (only for local Nautobot)
