---
# Temporal Web UI HTTPRoute (temporal.<base>) - OIDC-only, direct to app port
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $temporalName }}-web
  namespace: {{ .Values.global.namespace }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ .Values.global.namespace }}
  hostnames:
  - {{ tpl .Values.temporal.gateway.devUi.hostname . | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ $temporalName }}-web-service
      port: 8080
{{- end }}

---
# Unified UI HTTPRoute (at base hostname) - OIDC-only, direct to app port
{{- if .Values.ui.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $uiName }}
  namespace: {{ .Values.global.namespace }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ .Values.global.namespace }}
  hostnames:
  - {{ .Values.gateway.baseHostname | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ $uiName }}
      port: 3000
{{- end }}

# Nautobot svc-* HTTPRoute (JWT-only)
{{- if and .Values.nautobot.enabled .Values.externalServices.nautobot.local }}
{{- include "nv-config-manager.svcHTTPRoute" (dict
    "root" .
    "routeName" $nautobotName
    "svcHostname" (tpl (.Values.nautobot.gateway.svcHostname | default "") .)
    "backendName" $nautobotName
    "backendPort" 80
) }}
{{- end }}

# Nautobot HTTPRoute (when deployed locally)
{{- if and .Values.nautobot.enabled .Values.externalServices.nautobot.local }}
# -----------------------------------------------------------------------------
# Nautobot Auth Bypass HTTPRoute (for /api/)
# -----------------------------------------------------------------------------
# Nautobot supports multiple auth methods:
#   - OIDC/JWT (browser users via SSO)
#   - Native API tokens (Authorization: Token <token>)
#   - Remote user auth (trusts X-Auth-Request-User header from gateway)
#
# This route bypasses OIDC redirect but still extracts JWT claims if present,
# enabling Nautobot's remote user auth for SSO users while allowing native
# tokens for API clients.
# -----------------------------------------------------------------------------
{{- include "nv-config-manager.authBypassHTTPRoute" (dict
    "root" .
    "routeName" $nautobotName
    "enabled" .Values.nautobot.gateway.authBypass.enabled
    "paths" .Values.nautobot.gateway.authBypass.paths
    "hostname" (tpl .Values.nautobot.gateway.hostname .)
    "backendName" $nautobotName
    "backendPort" 80
) }}
# Main Nautobot HTTPRoute (for UI/browser access with OIDC)
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $nautobotName }}
  namespace: {{ .Values.global.namespace }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ .Values.global.namespace }}
  hostnames:
  - {{ tpl .Values.nautobot.gateway.hostname . | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ $nautobotName }}
      port: 80
{{- end }}

# Config Store API svc-* HTTPRoute (JWT-only)
{{- if .Values.configStore.enabled }}
{{- include "nv-config-manager.svcHTTPRoute" (dict
