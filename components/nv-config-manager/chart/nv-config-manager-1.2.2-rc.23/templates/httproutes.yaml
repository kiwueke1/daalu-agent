# =============================================================================
# HTTPRoutes for NVIDIA Config Manager Services
# =============================================================================
# This template creates HTTPRoutes for all enabled services in the platform
# Uses subdomain-based routing (each service gets its own hostname)
#
# When auth sidecar is enabled (gateway.auth.jwt.enabled), routes point to
# the sidecar port (8443) instead of the app port for JWT validation.
#
# Auth Bypass Routes:
# For services that need to support both OIDC/JWT and native token auth,
# separate HTTPRoutes are created for bypass paths. These routes get a
# SecurityPolicy with jwt.optional=true but NO oidc block, allowing:
#   - Valid JWT: claims extracted to headers (for remote user auth)
#   - No JWT: request passes through (service handles its own auth)
# =============================================================================

# =============================================================================
# Service (svc-*) HTTPRoute Helper Template
# =============================================================================
# Creates an HTTPRoute for the svc-* hostname (JWT-only, no OIDC).
# These routes allow CLI/machine clients to authenticate with just a JWT
# bearer token without being redirected to the OIDC login flow.
# A SecurityPolicy (in security-policy.yaml) attaches to this route with
# jwt.optional=true and no oidc block.
# =============================================================================
{{- define "nv-config-manager.svcHTTPRoute" }}
{{- if and $.root.Values.oidc.enabled $.svcHostname }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $.routeName }}-svc
  namespace: {{ $.root.Values.global.namespace }}
  annotations:
    # JWT-only service route - OIDC disabled, CLI/machine access
    nv-config-manager.nvidia.com/svc-route: "true"
spec:
  parentRefs:
  - name: {{ $.root.Values.gateway.name }}
    namespace: {{ $.root.Values.global.namespace }}
  hostnames:
  - {{ $.svcHostname | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ $.backendName }}
      port: {{ $.backendPort }}
{{- end }}
{{- end }}

# =============================================================================
# Auth Bypass HTTPRoute Helper Template
# =============================================================================
# Creates a separate HTTPRoute for paths that bypass OIDC but still support
# optional JWT auth. A SecurityPolicy (in security-policy.yaml) attaches to
# this route with jwt.optional=true and no oidc block.
# =============================================================================
{{- define "nv-config-manager.authBypassHTTPRoute" }}
{{- if and $.root.Values.oidc.enabled $.root.Values.gateway.authBypass.enabled $.enabled (gt (len $.paths) 0) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $.routeName }}-auth-bypass
  namespace: {{ $.root.Values.global.namespace }}
  annotations:
    # Auth bypass route - OIDC disabled, JWT optional with claim extraction
    nv-config-manager.nvidia.com/auth-bypass: "true"
spec:
  parentRefs:
  - name: {{ $.root.Values.gateway.name }}
    namespace: {{ $.root.Values.global.namespace }}
  hostnames:
  - {{ $.hostname | quote }}
  rules:
  {{- range $.paths }}
  - matches:
    - path:
        type: PathPrefix
        value: {{ . }}
    backendRefs:
    - name: {{ $.backendName }}
      port: {{ $.backendPort }}
  {{- end }}
{{- end }}
{{- end }}

{{- $renderName := include "nv-config-manager.componentName" (dict "root" . "component" "render") }}
{{- $ztpName := include "nv-config-manager.componentName" (dict "root" . "component" "ztp") }}
{{- $dhcpName := include "nv-config-manager.componentName" (dict "root" . "component" "dhcp") }}
{{- $temporalName := include "nv-config-manager.componentName" (dict "root" . "component" "temporal") }}
{{- $uiName := include "nv-config-manager.componentName" (dict "root" . "component" "ui") }}
{{- $nautobotName := include "nv-config-manager.componentName" (dict "root" . "component" "nautobot") }}
{{- $configStoreName := include "nv-config-manager.componentName" (dict "root" . "component" "config-store") }}

{{- if and .Values.gateway.enabled (eq (.Values.ingress.type | default "envoyGateway") "envoyGateway") }}

# Render Service svc-* HTTPRoute (JWT-only)
{{- if .Values.renderService.enabled }}
{{- include "nv-config-manager.svcHTTPRoute" (dict
    "root" .
    "routeName" $renderName
    "svcHostname" (tpl (.Values.renderService.gateway.svcHostname | default "") .)
    "backendName" (printf "%s-api" $renderName)
    "backendPort" 9000
) }}
{{- end }}

# Render Service HTTPRoute
{{- if .Values.renderService.enabled }}
{{- if .Values.renderService.gateway.authBypass }}
{{- include "nv-config-manager.authBypassHTTPRoute" (dict
    "root" .
    "routeName" $renderName
    "enabled" (.Values.renderService.gateway.authBypass.enabled | default false)
    "paths" (.Values.renderService.gateway.authBypass.paths | default list)
    "hostname" (tpl .Values.renderService.gateway.hostname .)
    "backendName" (printf "%s-api" $renderName)
    "backendPort" 9000
) }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $renderName }}
  namespace: {{ .Values.global.namespace }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ .Values.global.namespace }}
  hostnames:
  - {{ tpl .Values.renderService.gateway.hostname . | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ $renderName }}-api
      port: 9000
{{- end }}

