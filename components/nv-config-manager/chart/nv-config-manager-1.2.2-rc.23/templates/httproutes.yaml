    "paths" (.Values.configStore.gateway.api.authBypass.paths | default list)
    "hostname" (tpl .Values.configStore.gateway.api.hostname .)
    "backendName" (printf "%s-api" $configStoreName)
    "backendPort" 9000
) }}
{{- end }}
