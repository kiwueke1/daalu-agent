    "routeName" (printf "%s-api" $configStoreName)
    "svcHostname" (tpl (.Values.configStore.gateway.api.svcHostname | default "") .)
    "backendName" (printf "%s-api" $configStoreName)
    "backendPort" 9000
) }}
{{- end }}

# Config Store API HTTPRoute
{{- if .Values.configStore.enabled }}
{{- if .Values.configStore.gateway.api.authBypass }}
{{- include "nv-config-manager.authBypassHTTPRoute" (dict
    "root" .
    "routeName" (printf "%s-api" $configStoreName)
