{{- $dhcpName := include "nv-config-manager.componentName" (dict "root" . "component" "dhcp") }}
{{- $configStoreName := include "nv-config-manager.componentName" (dict "root" . "component" "config-store") }}
{{- $temporalName := include "nv-config-manager.componentName" (dict "root" . "component" "temporal") }}
{{- $renderName := include "nv-config-manager.componentName" (dict "root" . "component" "render") }}
{{- $ztpName := include "nv-config-manager.componentName" (dict "root" . "component" "ztp") }}
{{- $natsUser := include "nv-config-manager.natsUser" . }}
{{- $natsSecretName := include "nv-config-manager.natsSecretName" . }}
{{- $internalPort := 9000 }}
# =============================================================================
# Kubernetes Secrets Method (vault.method=kubernetes)
# =============================================================================
# When vault.method=kubernetes, this Job reads app-specific secrets created
# by the installer and assembles them into the nv-config-manager-ini secret that services consume.
# This mirrors the ESO method (vault-secrets.yaml) but uses native K8s secrets.
#
# Required secrets created by the installer before Helm install:
#   Core:
#     - nautobot-token: token
#     - redis-password: password
#     - {{ $natsSecretName }}: password (if nats.authMethod=password)
#     - slack-token: token (if slack configured)
#
#   PostgreSQL Databases (CNPG-managed or external):
#     - cluster-config-store-app: username, password
#     - cluster-temporal-app: username, password (if temporal enabled)
#     - cluster-temporal-visibility-app: username, password (if temporal enabled)
#     - cluster-dhcp-app: username, password (if dhcp enabled)
#     - cluster-nautobot-app: username, password (if nautobot.local enabled)
#
#   Temporal Workflows (if temporal enabled):
#     - device-creds: username  (password loaded from config-secrets.ini via api_user_key_r*)
#       Note: device interaction requires vault.configSecrets.enabled=true; without network
#       secrets configured, device workflows are unsupported.
#     - redfish-creds: lenovo-default-user, lenovo-default-password,
#                      lenovo-nv-config-manager-password, bluefield-default-user,
#                      bluefield-default-password, bluefield-nv-config-manager-password
#
#   Optional:
#     - air-creds: ssa-client-id, ssa-client-secret (if temporal.air.orgId set)
#
#   KEDA Autoscaling (if renderService.autoscaling.prometheus.tls.enabled):
#     - keda-prometheus-certs: ca.crt, tls.crt, tls.key
#       (Standalone secret, not assembled into nv-config-manager.ini.
#        Referenced directly by KEDA TriggerAuthentication.
#        Must be pre-created with mTLS certs for Prometheus access.)
#
# See vault-secrets.yaml for the ESO equivalent (vault.method=eso)
# =============================================================================

{{- include "nv-config-manager.validateSecrets" . -}}
{{- if eq .Values.secrets.method "kubernetes" }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nv-config-manager.componentName" (dict "root" . "component" "secret-assembler") }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nv-config-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret-assembler
  annotations:
    # Run before other resources
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "nv-config-manager.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: secret-assembler
    spec:
      restartPolicy: OnFailure
      serviceAccountName: secret-assembler-sa
      containers:
        - name: assembler
          image: "{{ .Values.global.images.kubectl.repository }}:{{ .Values.global.images.kubectl.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              
              echo "Assembling nv-config-manager.ini from app-specific secrets..."
              
              # Build the INI file from mounted secrets
              cat > /tmp/nv-config-manager.ini << 'INIEOF'
              # =================================================================
              # NVIDIA Config Manager Unified Configuration
              # Auto-generated by secret-assembler job
              # Environment: {{ .Values.global.environment }}
              # =================================================================

              {{ include "nv-config-manager.authIniSections" . | nindent 14 }}

              # -----------------------------------------------------------------
              # Nautobot Configuration (shared by all services)
              # -----------------------------------------------------------------
              [nautobot]
              server = {{ include "nv-config-manager.nautobotServer" . }}
              public_url = {{ include "nv-config-manager.nautobotPublicUrl" . }}
              token = $(cat /secrets/nautobot-token/token)
              version = {{ .Values.externalServices.nautobot.version }}
              {{- if .Values.externalServices.nautobot.maxWorkers }}
              max_workers = {{ .Values.externalServices.nautobot.maxWorkers }}
              {{- end }}
              {{- if .Values.externalServices.nautobot.retries }}
              retries = {{ .Values.externalServices.nautobot.retries }}
              {{- end }}
              verify = {{ .Values.externalServices.nautobot.verify }}
              cache_refresh_interval = {{ .Values.externalServices.nautobot.cacheRefreshInterval }}
              cache_ttl = {{ .Values.externalServices.nautobot.cacheTtl }}

              # -----------------------------------------------------------------
              # NATS Configuration (message queue for render service)
              # -----------------------------------------------------------------
              [nats]
              server = {{ include "nv-config-manager.natsServer" . }}
              queue = {{ .Values.externalServices.nats.queue }}
              auth_method = {{ .Values.externalServices.nats.authMethod }}
              {{- if eq .Values.externalServices.nats.authMethod "password" }}
              user = {{ $natsUser }}
              password = $(cat /secrets/{{ $natsSecretName }}/password)
              {{- else if eq .Values.externalServices.nats.authMethod "JWT" }}
              creds_path = {{ .Values.externalServices.nats.credsPath }}
              {{- end }}
              local = {{ .Values.externalServices.nats.local }}

              # -----------------------------------------------------------------
              # Redis Configuration (shared by all services)
              # -----------------------------------------------------------------
              [redis]
              host = {{ include "nv-config-manager.redisHost" . }}
              port = {{ .Values.externalServices.redis.port }}
              db = {{ .Values.externalServices.redis.db }}
              lock_db = {{ .Values.externalServices.redis.lockDb }}
              ssl = {{ .Values.externalServices.redis.ssl }}
              socket_timeout = {{ .Values.externalServices.redis.socketTimeout }}
              socket_connect_timeout = {{ .Values.externalServices.redis.socketConnectTimeout }}
              {{- if .Values.externalServices.redis.passwordAuth }}
              password = $(cat /secrets/redis-password/password)
              {{- end }}

              # -----------------------------------------------------------------
              # Config Store Database Configuration
              # -----------------------------------------------------------------
              [config_store]
              database_host = {{ tpl (required "externalServices.postgres.configStore.host is required" .Values.externalServices.postgres.configStore.host) . }}
              database_port = {{ .Values.externalServices.postgres.port }}
              database = {{ .Values.externalServices.postgres.configStore.database }}
              database_user = $(cat /secrets/cluster-config-store-app/username)
              database_password = $(cat /secrets/cluster-config-store-app/password)

              # -----------------------------------------------------------------
              # Config Store API Configuration
              # -----------------------------------------------------------------
              [config_store.api]
              # CORS origins allowed to make cross-origin requests with credentials
              cors_origins = https://{{ .Values.gateway.baseHostname }}
              {{- if .Values.configStore.gateway.api.allowedGroups }}
              allowed_groups = {{ .Values.configStore.gateway.api.allowedGroups | join "," }}
              {{- end }}

              # -----------------------------------------------------------------
              # Config Store Client Configuration (for all services to fetch configs)
              # -----------------------------------------------------------------
              [config_store.client]
              # Internal endpoint for service-to-service calls (within cluster)
              # Uses sidecar port when auth sidecars are enabled for header injection
              api_service = http://{{ $configStoreName }}-api:{{ $internalPort }}
              # External URL for user-facing links (markdown, nautobot references, etc.)
              api_url = https://{{ tpl .Values.configStore.gateway.api.hostname . }}
              ui_url = https://{{ .Values.gateway.baseHostname }}
              # Set to true for internal cluster communication (uses api_service)
              # Set to false for external mTLS communication (uses api_url)
              use_internal_endpoint = {{ .Values.configStore.client.useInternalEndpoint | default true }}
              verify = {{ .Values.configStore.client.verify | default true }}

              {{- if .Values.temporal.enabled }}
              # -----------------------------------------------------------------
              # Temporal/Workflow Configuration
              # -----------------------------------------------------------------
              [temporal]
              # Internal: Temporal gRPC frontend (for workers, SDK clients)
              grpc_service = {{ $temporalName }}-frontend-service.{{ .Values.global.namespace }}.svc:{{ .Values.temporal.services.frontend.port }}
              # Internal: NVIDIA Config Manager Temporal API (for internal service calls)
              # Uses sidecar port when auth sidecars are enabled for header injection
              api_service = http://{{ $temporalName }}-api:{{ $internalPort }}
              # External: Gateway URLs for user-facing links
              api_url = https://{{ tpl .Values.temporal.gateway.api.hostname . }}
              ui_url = https://{{ .Values.gateway.baseHostname }}
              # Set to true for internal cluster communication (uses api_service)
              # Set to false for external mTLS communication (uses api_url)
              use_internal_endpoint = {{ .Values.temporal.client.useInternalEndpoint | default true }}

              [temporal.elasticsearch]
              local = {{ .Values.externalServices.elasticsearch.local }}
              server = {{ tpl .Values.externalServices.elasticsearch.server . }}
              {{- if .Values.externalServices.elasticsearch.domain }}
              domain = {{ .Values.externalServices.elasticsearch.domain }}
              {{- end }}

              {{- if .Values.temporal.air.orgId }}
              [temporal.air]
              ssa_client_id = $(cat /secrets/air-creds/ssa-client-id)
              ssa_client_secret = $(cat /secrets/air-creds/ssa-client-secret)
              org_id = {{ .Values.temporal.air.orgId }}
              air_api_url = {{ .Values.temporal.air.airApiUrl }}
              air_node_user = {{ .Values.temporal.air.airNodeUser }}
              air_node_password = {{ .Values.temporal.air.airNodePassword }}
              {{- end }}

              # -----------------------------------------------------------------
              # Temporal API Configuration (REST API for workflow operations)
              # -----------------------------------------------------------------
              [temporal.api]
              # CORS origins allowed to make cross-origin requests with credentials
              cors_origins = https://{{ .Values.gateway.baseHostname }}
              {{- if .Values.temporal.gateway.api.allowedGroups }}
              allowed_groups = {{ .Values.temporal.gateway.api.allowedGroups | join "," }}
              {{- end }}

              # -----------------------------------------------------------------
              # Device Credentials (for Temporal workflows)
              # -----------------------------------------------------------------
              [device]
              username = $(cat /secrets/device-creds/username)
              {{- if .Values.localDev.mockDevices }}
              mock = true
              {{- end }}
              {{- end }}

              {{- if .Values.temporal.redfish.enabled }}
              # -----------------------------------------------------------------
              # Redfish/BMC Configuration (for Temporal workflows)
              # -----------------------------------------------------------------
              [redfish]
              lenovo_default_user = $(cat /secrets/redfish-creds/lenovo-default-user)
              lenovo_default_password = $(cat /secrets/redfish-creds/lenovo-default-password)
              lenovo_config_manager_password = $(cat /secrets/redfish-creds/lenovo-nv-config-manager-password)
              bluefield_default_user = $(cat /secrets/redfish-creds/bluefield-default-user)
              bluefield_default_password = $(cat /secrets/redfish-creds/bluefield-default-password)
              bluefield_config_manager_password = $(cat /secrets/redfish-creds/bluefield-nv-config-manager-password)
              {{- end }}

              # -----------------------------------------------------------------
              # Render Service Configuration
              # -----------------------------------------------------------------
              {{- if .Values.renderService.enabled }}
              [render]
              # Internal endpoint for service-to-service calls
              # Uses sidecar port when auth sidecars are enabled for header injection
              api_service = http://{{ $renderName }}-api:{{ $internalPort }}
              # External URL for user-facing links
              api_url = https://{{ tpl .Values.renderService.gateway.hostname . }}
              # Set to true for internal cluster communication (uses api_service)
              # Set to false for external mTLS communication (uses api_url)
              use_internal_endpoint = {{ .Values.renderService.client.useInternalEndpoint | default true }}
              {{- if .Values.renderService.gateway.allowedGroups }}
              allowed_groups = {{ .Values.renderService.gateway.allowedGroups | join "," }}
              {{- end }}
              {{- end }}

              # -----------------------------------------------------------------
              # Aggregate Environment Configuration
              # -----------------------------------------------------------------
              [aggregate]
              is_aggregate_environment = {{ .Values.global.aggregate }}

              {{- $slackChannel := dig "slack" "channel" "" .Values.externalServices }}
              {{- if $slackChannel }}
              # -----------------------------------------------------------------
              # Slack Configuration (shared notifications)
              # -----------------------------------------------------------------
              [slack]
              bot_token = $(cat /secrets/slack-token/token)
              channel_name = {{ $slackChannel }}
              {{- end }}

              {{- if .Values.networkDhcp.enabled }}
              # -----------------------------------------------------------------
              # DHCP Service Configuration
              # -----------------------------------------------------------------
              [dhcp]
              # Internal endpoint for service-to-service calls
              # Uses sidecar port when auth sidecars are enabled for header injection
              api_service = http://{{ $dhcpName }}-internal:{{ $internalPort }}
              # External URL for user-facing links
              api_url = https://{{ tpl .Values.networkDhcp.gateway.hostname . }}
              {{- if .Values.networkDhcp.gateway.allowedGroups }}
              allowed_groups = {{ .Values.networkDhcp.gateway.allowedGroups | join "," }}
              {{- end }}

              [dhcp.kea]
              server = {{ $dhcpName }}-internal
              port = 8000

              [dhcp.lease_db]
              local = false
              host = {{ tpl .Values.externalServices.postgres.dhcp.host . }}
              port = {{ .Values.externalServices.postgres.port }}
              database = {{ .Values.externalServices.postgres.dhcp.database }}
              user = $(cat /secrets/cluster-dhcp-app/username)
              password = $(cat /secrets/cluster-dhcp-app/password)
              {{- end }}

              {{- if .Values.networkZtp.enabled }}
              # -----------------------------------------------------------------
              # ZTP Service Configuration
              # -----------------------------------------------------------------
              [ztp]
              # Internal endpoint for service-to-service calls
              # Uses sidecar port when auth sidecars are enabled for header injection
              api_service = http://{{ $ztpName }}-api:{{ $internalPort }}
              # External URL for user-facing links
              api_url = https://{{ tpl .Values.networkZtp.gateway.hostname . }}
              # User domain for workflow context
              user_domain = {{ .Values.global.environment }}.{{ .Values.global.baseDomain }}
              # Set to true for internal cluster communication (uses api_service)
              # Set to false for external mTLS communication (uses api_url)
              use_internal_endpoint = {{ .Values.networkZtp.client.useInternalEndpoint | default true }}
              {{- if .Values.networkZtp.gateway.allowedGroups }}
              allowed_groups = {{ .Values.networkZtp.gateway.allowedGroups | join "," }}
              {{- end }}

              {{- end }}

              {{- if and .Values.temporal.enabled .Values.externalServices.jira.enabled }}
              # -----------------------------------------------------------------
              # Jira Configuration (local dev — credentials from jira-creds secret)
              # -----------------------------------------------------------------
              [jira]
              base_url  = {{ .Values.externalServices.jira.baseUrl }}
              api_token = $(cat /secrets/jira-creds/api-token)
              {{- end }}
              INIEOF
              
              # Substitute all $(cat ...) references with actual values using sed
              cp /tmp/nv-config-manager.ini /tmp/nv-config-manager-final.ini
              for secret_file in /secrets/*/*; do
                if [ -f "$secret_file" ]; then
                  # Read value and escape special characters for sed
                  value=$(cat "$secret_file" | tr -d '\n' | sed 's/[&/\]/\\&/g')
                  # Replace $(cat /path/to/file) with actual value
                  escaped_path=$(echo "$secret_file" | sed 's/[&/\]/\\&/g')
                  sed -i "s|\$(cat ${secret_file})|${value}|g" /tmp/nv-config-manager-final.ini
                fi
              done
              
              # Create or update the ini secret
              kubectl create secret generic {{ include "nv-config-manager.iniSecretName" . }} \
                --from-file=nv-config-manager.ini=/tmp/nv-config-manager-final.ini \
                --namespace={{ .Values.global.namespace }} \
                --dry-run=client -o yaml | kubectl apply -f -
              
              echo "Successfully assembled {{ include "nv-config-manager.iniSecretName" . }} secret"
          volumeMounts:
            # Core secrets (always required)
            - name: nautobot-token
              mountPath: /secrets/nautobot-token
              readOnly: true
            - name: redis-password
              mountPath: /secrets/redis-password
              readOnly: true
            {{- if eq .Values.externalServices.nats.authMethod "password" }}
            - name: {{ $natsSecretName }}
              mountPath: /secrets/{{ $natsSecretName }}
              readOnly: true
            {{- end }}
            {{- if (dig "slack" "channel" "" .Values.externalServices) }}
            - name: slack-token
              mountPath: /secrets/slack-token
              readOnly: true
            {{- end }}
            # Config Store secrets
            - name: cluster-config-store-app
              mountPath: /secrets/cluster-config-store-app
              readOnly: true
            {{- if .Values.temporal.enabled }}
            # Temporal secrets
            - name: device-creds
              mountPath: /secrets/device-creds
              readOnly: true
            {{- if .Values.temporal.redfish.enabled }}
            - name: redfish-creds
              mountPath: /secrets/redfish-creds
              readOnly: true
            {{- end }}
            {{- if .Values.temporal.air.orgId }}
            - name: air-creds
              mountPath: /secrets/air-creds
              readOnly: true
            {{- end }}
            {{- end }}
            {{- if .Values.networkDhcp.enabled }}
            # DHCP secrets
            - name: cluster-dhcp-app
              mountPath: /secrets/cluster-dhcp-app
              readOnly: true
            {{- end }}
            {{- if and .Values.temporal.enabled .Values.externalServices.jira.enabled }}
            # Jira secrets (local dev)
            - name: jira-creds
              mountPath: /secrets/jira-creds
              readOnly: true
            {{- end }}
      volumes:
        # Core secrets (always required)
        - name: nautobot-token
          secret:
            secretName: nautobot-token
        - name: redis-password
          secret:
            secretName: redis-password
        {{- if eq .Values.externalServices.nats.authMethod "password" }}
        - name: {{ $natsSecretName }}
          secret:
            secretName: {{ $natsSecretName }}
        {{- end }}
        {{- if (dig "slack" "channel" "" .Values.externalServices) }}
        - name: slack-token
          secret:
            secretName: slack-token
        {{- end }}
        # Config Store secrets
        - name: cluster-config-store-app
          secret:
            secretName: cluster-config-store-app
        {{- if .Values.temporal.enabled }}
        # Temporal secrets
        - name: device-creds
          secret:
            secretName: device-creds
        {{- if .Values.temporal.redfish.enabled }}
        - name: redfish-creds
          secret:
            secretName: redfish-creds
        {{- end }}
        {{- if .Values.temporal.air.orgId }}
        - name: air-creds
          secret:
            secretName: air-creds
        {{- end }}
        {{- end }}
        {{- if .Values.networkDhcp.enabled }}
        # DHCP secrets
        - name: cluster-dhcp-app
          secret:
            secretName: cluster-dhcp-app
        {{- end }}
        {{- if and .Values.temporal.enabled .Values.externalServices.jira.enabled }}
        # Jira secrets (local dev)
        - name: jira-creds
          secret:
            secretName: jira-creds
        {{- end }}
---
# ServiceAccount for the secret assembler job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-assembler-sa
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nv-config-manager.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
---
# Role to create/update secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-assembler-role
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nv-config-manager.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-assembler-rolebinding
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nv-config-manager.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secret-assembler-role
subjects:
  - kind: ServiceAccount
    name: secret-assembler-sa
    namespace: {{ .Values.global.namespace }}
{{- end }}
