{{- if .Values.gateway.healthChecks.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: health-check-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nv-config-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: health-check
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: health-check
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-check
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nv-config-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: health-check
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: health-check
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: health-check
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- include "nv-config-manager.podSecurityContext" . | nindent 6 }}
      containers:
      - name: health-check
        image: {{ .Values.global.images.httpEcho.repository | default "hashicorp/http-echo" }}:{{ .Values.global.images.httpEcho.tag | default "1.0" }}
        imagePullPolicy: {{ index (index (index .Values.global "images" | default dict) "httpEcho" | default dict) "pullPolicy" | default .Values.global.imagePullPolicy | default "IfNotPresent" }}
        args:
        - -text=OK
        - -listen=:8080
        {{- include "nv-config-manager.containerSecurityContext" . | nindent 8 }}
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi
{{- end }}

