# Temporal API Ingress
{{- if .Values.temporal.enabled }}
{{- $temporalCorsAnnotations := dict
    "nginx.ingress.kubernetes.io/enable-cors" "true"
    "nginx.ingress.kubernetes.io/cors-allow-methods" "PUT, GET, POST, OPTIONS, DELETE, PATCH"
    "nginx.ingress.kubernetes.io/cors-allow-credentials" "true"
    "nginx.ingress.kubernetes.io/cors-allow-origin" (printf "https://%s" .Values.gateway.baseHostname)
}}
{{- $temporalApiAnnotations := merge $temporalCorsAnnotations $annotations }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $temporalName }}-api
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nv-config-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal-api
  annotations:
    {{- toYaml $temporalApiAnnotations | nindent 4 }}
spec:
  ingressClassName: {{ $ingressClassName }}
  {{- if .Values.gateway.certificates.enabled }}
  tls:
    - hosts:
        - {{ tpl .Values.temporal.gateway.api.hostname . }}
      secretName: {{ $tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ tpl .Values.temporal.gateway.api.hostname . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $temporalName }}-api
                port:
                  number: 9000
---
# Temporal Web UI Ingress (temporal.<base>) - OIDC-only, direct to app port
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $temporalName }}-web
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nv-config-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal-web
  annotations:
    {{- toYaml $annotations | nindent 4 }}
spec:
  ingressClassName: {{ $ingressClassName }}
  {{- if .Values.gateway.certificates.enabled }}
  tls:
    - hosts:
        - {{ tpl .Values.temporal.gateway.devUi.hostname . }}
      secretName: {{ $tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ tpl .Values.temporal.gateway.devUi.hostname . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $temporalName }}-web-service
                port:
                  number: 8080
{{- end }}

