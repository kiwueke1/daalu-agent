# =============================================================================
# Security Policies for NVIDIA Config Manager Gateway
# =============================================================================
# Architecture:
#   Gateway-level SecurityPolicy with JWT (optional) + OIDC
#   Per-service auth bypass policies for paths that need alternative auth
#
# How it works (requires Envoy Gateway v1.5.0+):
#   - jwt.optional: true means JWT validation is tried first but not required
#   - If valid JWT present (header or cookie) → request proceeds, OIDC skipped
#   - If no JWT → OIDC kicks in for browser login flow
#
# Auth Bypass Routes:
#   - For paths like /api/ on services like Nautobot
#   - JWT is optional, claims extracted if present
#   - NO OIDC redirect - service handles its own auth (native tokens, etc.)
#   - Sidecar also allows missing JWT on these paths
#
# This enables:
#   - Browser access: OIDC login → session cookies shared across all subdomains
#   - CLI access: svc-* hostnames with JWT-only SecurityPolicy (no OIDC redirect)
#   - UI calling APIs: NVConfigManagerAccessToken cookie → JWT validated from cookie
#   - Native API tokens: Service's own auth (e.g., Nautobot Token auth)
#
# Reference: https://github.com/envoyproxy/gateway/discussions/2425
#
# IdP Configuration:
#   Register ONLY this redirect URI:
#     - https://<baseHostname>/oauth2/callback
#
# =============================================================================

# =============================================================================
# Service (svc-*) SecurityPolicy Helper Template
# =============================================================================
# Creates a SecurityPolicy for svc-* HTTPRoutes with jwt.optional=true
# but NO oidc block. This enables CLI/machine clients to authenticate
# with a JWT bearer token without being redirected to the OIDC login flow.
# =============================================================================
{{- define "nv-config-manager.svcSecurityPolicy" }}
{{- if and $.root.Values.oidc.enabled $.svcHostname }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ $.routeName }}-svc
  namespace: {{ $.root.Values.global.namespace }}
  labels:
    {{- include "nv-config-manager.labels" $.root | nindent 4 }}
spec:
  # Attach to the svc-* HTTPRoute for this service
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ $.routeName }}-svc
  
  {{- if $.root.Values.gateway.cors.enabled }}
  cors:
    allowOrigins:
    {{- if $.root.Values.gateway.cors.allowOrigins }}
    {{- range $.root.Values.gateway.cors.allowOrigins }}
    {{- if kindIs "string" . }}
    - {{ . | quote }}
    {{- else if .regex }}
    - {{ .regex | quote }}
    {{- else if .exact }}
    - {{ .exact | quote }}
    {{- end }}
    {{- end }}
    {{- else if $.root.Values.gateway.baseHostname }}
    - {{ printf "https://%s" $.root.Values.gateway.baseHostname | quote }}
    - {{ printf "https://*.%s" $.root.Values.gateway.baseHostname | quote }}
    {{- end }}
    allowMethods:
    {{- range $.root.Values.gateway.cors.allowMethods }}
    - {{ . | quote }}
    {{- end }}
    allowHeaders:
    {{- range $.root.Values.gateway.cors.allowHeaders }}
    - {{ . | quote }}
    {{- end }}
    exposeHeaders:
    {{- range $.root.Values.gateway.cors.exposeHeaders }}
    - {{ . | quote }}
    {{- end }}
    allowCredentials: {{ $.root.Values.gateway.cors.allowCredentials | default true }}
    maxAge: {{ $.root.Values.gateway.cors.maxAge | quote }}
  {{- end }}
  
  # JWT validation - validate if present, extract claims to headers.
  # NO oidc block - requests without valid JWT are left to the service's
  # own auth middleware, avoiding browser redirects on svc-* hostnames.
  jwt:
    optional: true
    providers:
      - name: "oidc-provider"
        issuer: {{ $.root.Values.oidc.issuerUrl | quote }}
        {{- if $.root.Values.oidc.audiences }}
        audiences:
        {{- range $.root.Values.oidc.audiences }}
          - {{ . | quote }}
        {{- end }}
        {{- else }}
        audiences:
          - "account"
          - {{ $.root.Values.oidc.clientId | quote }}
        {{- end }}
        remoteJWKS:
          {{- if $.root.Values.oidc.jwksUri }}
          uri: {{ $.root.Values.oidc.jwksUri | quote }}
          {{- else if $.root.Values.oidc.internalIssuerUrl }}
          uri: {{ printf "%s/protocol/openid-connect/certs" (trimSuffix "/" $.root.Values.oidc.internalIssuerUrl) | quote }}
          {{- else }}
          uri: {{ printf "%s/protocol/openid-connect/certs" (trimSuffix "/" $.root.Values.oidc.issuerUrl) | quote }}
          {{- end }}
        extractFrom:
          headers:
            - name: Authorization
              valuePrefix: "Bearer "
        {{- if $.root.Values.oidc.claimToHeaders }}
        claimToHeaders:
        {{- range $.root.Values.oidc.claimToHeaders }}
          - header: {{ .header | quote }}
            claim: {{ .claim | quote }}
        {{- end }}
        {{- end }}
      {{- range $provider := $.root.Values.gateway.auth.jwt.providers }}
      - name: {{ $provider.name | quote }}
        issuer: {{ $provider.issuer | quote }}
        {{- if $provider.audiences }}
        audiences:
        {{- range $provider.audiences }}
          - {{ . | quote }}
        {{- end }}
        {{- end }}
        remoteJWKS:
          {{- $jwksUri := $provider.jwksUri }}
          {{- if not $jwksUri }}
          {{- $jwksUri = printf "%s/discovery/v2.0/keys" (trimSuffix "/v2.0" (trimSuffix "/" $provider.issuer)) }}
          {{- end }}
          uri: {{ $jwksUri | quote }}
        extractFrom:
          headers:
            - name: Authorization
              valuePrefix: "Bearer "
      {{- end }}
  # NO oidc block - CLI/machine clients authenticate via JWT only
{{- end }}
{{- end }}

# =============================================================================
# Auth Bypass SecurityPolicy Helper Template
# =============================================================================
# Creates a SecurityPolicy with jwt.optional=true but NO oidc.
# This allows requests without JWT to pass through while still
# extracting claims if a valid JWT is present.
# =============================================================================
{{- define "nv-config-manager.authBypassSecurityPolicy" }}
{{- if and $.root.Values.oidc.enabled $.root.Values.gateway.authBypass.enabled $.enabled (or (gt (len $.paths) 0) $.pathRegex) }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ $.routeName }}-auth-bypass
  namespace: {{ $.root.Values.global.namespace }}
  labels:
    {{- include "nv-config-manager.labels" $.root | nindent 4 }}
spec:
  # Attach to the auth-bypass HTTPRoute for this service
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ $.routeName }}-auth-bypass
  
  {{- if $.root.Values.gateway.cors.enabled }}
  cors:
    allowOrigins:
    {{- if $.root.Values.gateway.cors.allowOrigins }}
    {{- range $.root.Values.gateway.cors.allowOrigins }}
    {{- if kindIs "string" . }}
    - {{ . | quote }}
    {{- else if .regex }}
    - {{ .regex | quote }}
    {{- else if .exact }}
    - {{ .exact | quote }}
    {{- end }}
    {{- end }}
    {{- else if $.root.Values.gateway.baseHostname }}
    - {{ printf "https://%s" $.root.Values.gateway.baseHostname | quote }}
    - {{ printf "https://*.%s" $.root.Values.gateway.baseHostname | quote }}
    {{- end }}
    allowMethods:
    {{- range $.root.Values.gateway.cors.allowMethods }}
    - {{ . | quote }}
    {{- end }}
    allowHeaders:
    {{- range $.root.Values.gateway.cors.allowHeaders }}
    - {{ . | quote }}
    {{- end }}
    exposeHeaders:
    {{- range $.root.Values.gateway.cors.exposeHeaders }}
    - {{ . | quote }}
    {{- end }}
    allowCredentials: {{ $.root.Values.gateway.cors.allowCredentials | default true }}
    maxAge: {{ $.root.Values.gateway.cors.maxAge | quote }}
  {{- end }}
  
  # JWT validation is optional - validate if present, extract claims, but allow through if missing
  # This enables services to use their own auth (native tokens) while still supporting JWT
  jwt:
    optional: true
    providers:
      - name: "oidc-provider"
        issuer: {{ $.root.Values.oidc.issuerUrl | quote }}
        {{- if $.root.Values.oidc.audiences }}
        audiences:
        {{- range $.root.Values.oidc.audiences }}
          - {{ . | quote }}
        {{- end }}
        {{- else }}
        audiences:
          - "account"
          - {{ $.root.Values.oidc.clientId | quote }}
        {{- end }}
        remoteJWKS:
          {{- if $.root.Values.oidc.jwksUri }}
          uri: {{ $.root.Values.oidc.jwksUri | quote }}
          {{- else if $.root.Values.oidc.internalIssuerUrl }}
          uri: {{ printf "%s/protocol/openid-connect/certs" (trimSuffix "/" $.root.Values.oidc.internalIssuerUrl) | quote }}
          {{- else }}
          uri: {{ printf "%s/protocol/openid-connect/certs" (trimSuffix "/" $.root.Values.oidc.issuerUrl) | quote }}
          {{- end }}
        extractFrom:
          headers:
            - name: Authorization
              valuePrefix: "Bearer "
          cookies:
            - "NVConfigManagerAccessToken"
        {{- if $.root.Values.oidc.claimToHeaders }}
        claimToHeaders:
        {{- range $.root.Values.oidc.claimToHeaders }}
          - header: {{ .header | quote }}
            claim: {{ .claim | quote }}
        {{- end }}
        {{- end }}
  # NO oidc block - requests without valid JWT pass through without redirect
{{- end }}
{{- end }}

{{- if and .Values.gateway.enabled (eq (.Values.ingress.type | default "envoyGateway") "envoyGateway") }}

{{- $gatewaySecurityName := include "nv-config-manager.componentName" (dict "root" . "component" "gateway-security") }}

# =============================================================================
# SecurityPolicy for Gateway (CORS + OIDC)
# =============================================================================
# CORS and OIDC are configured at the Gateway level to be shared across all routes.
# This ensures all subdomains share the same OIDC session.
# =============================================================================
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ $gatewaySecurityName }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nv-config-manager.labels" . | nindent 4 }}
spec:
  # Attach to Gateway - provides CORS and OIDC for all routes
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ .Values.gateway.name }}
  
  {{- if .Values.gateway.cors.enabled }}
  cors:
    allowOrigins:
    {{- if .Values.gateway.cors.allowOrigins }}
    {{- range .Values.gateway.cors.allowOrigins }}
    {{- if kindIs "string" . }}
    - {{ . | quote }}
    {{- else if .regex }}
    - {{ .regex | quote }}
    {{- else if .exact }}
    - {{ .exact | quote }}
    {{- end }}
    {{- end }}
    {{- else if .Values.gateway.baseHostname }}
    - {{ printf "https://%s" .Values.gateway.baseHostname | quote }}
    - {{ printf "https://*.%s" .Values.gateway.baseHostname | quote }}
    {{- end }}
    allowMethods:
    {{- range .Values.gateway.cors.allowMethods }}
    - {{ . | quote }}
    {{- end }}
    allowHeaders:
    {{- range .Values.gateway.cors.allowHeaders }}
    - {{ . | quote }}
    {{- end }}
    exposeHeaders:
    {{- range .Values.gateway.cors.exposeHeaders }}
    - {{ . | quote }}
    {{- end }}
    allowCredentials: {{ .Values.gateway.cors.allowCredentials | default true }}
    maxAge: {{ .Values.gateway.cors.maxAge | quote }}
  {{- end }}

  {{- if .Values.oidc.enabled }}
  # JWT validation (optional) - if valid JWT present, skip OIDC
  # Requires Envoy Gateway v1.5.0+ for jwt.optional feature
  jwt:
    optional: true
    providers:
      - name: "oidc-provider"
        issuer: {{ .Values.oidc.issuerUrl | quote }}
        {{- if .Values.oidc.audiences }}
        audiences:
        {{- range .Values.oidc.audiences }}
          - {{ . | quote }}
        {{- end }}
        {{- else }}
        audiences:
          - "account"
          - {{ .Values.oidc.clientId | quote }}
        {{- end }}
        remoteJWKS:
          {{- if .Values.oidc.jwksUri }}
          uri: {{ .Values.oidc.jwksUri | quote }}
          {{- else if .Values.oidc.internalIssuerUrl }}
          uri: {{ printf "%s/protocol/openid-connect/certs" (trimSuffix "/" .Values.oidc.internalIssuerUrl) | quote }}
          {{- else }}
          uri: {{ printf "%s/protocol/openid-connect/certs" (trimSuffix "/" .Values.oidc.issuerUrl) | quote }}
          {{- end }}
        # Extract JWT from Authorization header (CLI) and cookie (browser/UI)
        extractFrom:
          headers:
            - name: Authorization
              valuePrefix: "Bearer "
          cookies:
            - "NVConfigManagerAccessToken"
        {{- if .Values.oidc.claimToHeaders }}
        claimToHeaders:
        {{- range .Values.oidc.claimToHeaders }}
          - header: {{ .header | quote }}
            claim: {{ .claim | quote }}
        {{- end }}
        {{- end }}

  {{- if .Values.oidc.interactiveRedirect }}
  # OIDC fallback - if no valid JWT, redirect to login.
  # Daalu hub-proxied tenants set oidc.interactiveRedirect=false: the hub
  # authenticates the user (its own session) and injects a service Bearer the
  # JWT block above validates, so the gateway must NOT run the interactive
  # oauth2 redirect — its session cookie is scoped to baseHostname and is never
  # sent back to the FLAT sibling tool hosts (<tool>-<slug>.<zone>), so OIDC
  # would loop forever. JWT (+ claim headers) stays on; OIDC redirect is off.
  oidc:
    provider:
      issuer: {{ .Values.oidc.issuerUrl | quote }}
      {{- if .Values.oidc.authorizationEndpoint }}
      authorizationEndpoint: {{ .Values.oidc.authorizationEndpoint | quote }}
      {{- else }}
      authorizationEndpoint: {{ printf "%s/protocol/openid-connect/auth" (trimSuffix "/" .Values.oidc.issuerUrl) | quote }}
      {{- end }}
      {{- if .Values.oidc.tokenEndpoint }}
      tokenEndpoint: {{ .Values.oidc.tokenEndpoint | quote }}
      {{- else if .Values.oidc.internalIssuerUrl }}
      tokenEndpoint: {{ printf "%s/protocol/openid-connect/token" (trimSuffix "/" .Values.oidc.internalIssuerUrl) | quote }}
      {{- else }}
      tokenEndpoint: {{ printf "%s/protocol/openid-connect/token" (trimSuffix "/" .Values.oidc.issuerUrl) | quote }}
      {{- end }}
    clientID: {{ .Values.oidc.clientId | quote }}
    clientSecret:
      name: {{ .Values.oidc.clientSecretName | default "oidc-client-secret" | quote }}
    # Use the main UI hostname as callback - works for all routes per Envoy Gateway docs
    {{- if .Values.oidc.callbackPort }}
    redirectURL: {{ printf "https://%s:%s/oauth2/callback" .Values.gateway.baseHostname (.Values.oidc.callbackPort | toString) | quote }}
    {{- else }}
    redirectURL: {{ printf "https://%s/oauth2/callback" .Values.gateway.baseHostname | quote }}
    {{- end }}
    logoutPath: "/oauth2/logout"
    scopes:
    {{- if .Values.oidc.scopes }}
    {{- range .Values.oidc.scopes }}
      - {{ . | quote }}
    {{- end }}
    {{- else }}
      - "openid"
      - "email"
      - "profile"
    {{- end }}
    forwardAccessToken: true
    {{- if .Values.oidc.disableTokenEncryption }}
    # Disable token encryption so JWTs are stored as plain text in cookies
    # This allows the JWT validation to extract claims from the cookie
    disableTokenEncryption: true
    {{- end }}
    # Cookie configuration for cross-subdomain session sharing
    {{- if .Values.gateway.baseHostname }}
    cookieDomain: {{ .Values.gateway.baseHostname | quote }}
    {{- end }}
    cookieNames:
      accessToken: "NVConfigManagerAccessToken"
      idToken: "NVConfigManagerIdToken"
  {{- end }}
  {{- end }}

# =============================================================================
# Auth Bypass SecurityPolicies (per-service)
# =============================================================================
# These policies are attached to auth-bypass HTTPRoutes for specific paths.
# They have:
#   - jwt.optional: true (validate if present, extract claims to headers)
#   - NO oidc block (no redirect to login)
#   - CORS enabled
#
# This allows services to handle their own authentication (native tokens,
# API keys, etc.) while still supporting JWT auth for users with valid tokens.
# =============================================================================

# Nautobot Auth Bypass SecurityPolicy
{{- if and .Values.nautobot.enabled .Values.externalServices.nautobot.local }}
{{- $nautobotName := include "nv-config-manager.componentName" (dict "root" . "component" "nautobot") }}
{{- include "nv-config-manager.authBypassSecurityPolicy" (dict 
    "root" . 
    "routeName" $nautobotName
    "enabled" .Values.nautobot.gateway.authBypass.enabled
    "paths" .Values.nautobot.gateway.authBypass.paths
) }}
{{- end }}

# Render Service Auth Bypass SecurityPolicy
{{- if .Values.renderService.enabled }}
{{- if .Values.renderService.gateway.authBypass }}
{{- $renderName := include "nv-config-manager.componentName" (dict "root" . "component" "render") }}
{{- include "nv-config-manager.authBypassSecurityPolicy" (dict 
    "root" . 
    "routeName" $renderName
    "enabled" (.Values.renderService.gateway.authBypass.enabled | default false)
    "paths" (.Values.renderService.gateway.authBypass.paths | default list)
) }}
{{- end }}
{{- end }}

# Network ZTP Auth Bypass SecurityPolicy
{{- if .Values.networkZtp.enabled }}
{{- if .Values.networkZtp.gateway.authBypass }}
{{- $ztpName := include "nv-config-manager.componentName" (dict "root" . "component" "ztp") }}
{{- include "nv-config-manager.authBypassSecurityPolicy" (dict 
    "root" . 
    "routeName" $ztpName
    "enabled" (.Values.networkZtp.gateway.authBypass.enabled | default false)
    "paths" (.Values.networkZtp.gateway.authBypass.paths | default list)
) }}
{{- end }}
{{- end }}

# Network DHCP Auth Bypass SecurityPolicy
{{- if .Values.networkDhcp.enabled }}
{{- if .Values.networkDhcp.gateway.authBypass }}
{{- $dhcpName := include "nv-config-manager.componentName" (dict "root" . "component" "dhcp") }}
{{- include "nv-config-manager.authBypassSecurityPolicy" (dict 
    "root" . 
    "routeName" $dhcpName
    "enabled" (.Values.networkDhcp.gateway.authBypass.enabled | default false)
    "paths" (.Values.networkDhcp.gateway.authBypass.paths | default list)
) }}
{{- end }}
{{- end }}

# Temporal API Auth Bypass SecurityPolicy
{{- if .Values.temporal.enabled }}
{{- if .Values.temporal.gateway.api.authBypass }}
{{- $temporalName := include "nv-config-manager.componentName" (dict "root" . "component" "temporal") }}
{{- include "nv-config-manager.authBypassSecurityPolicy" (dict 
    "root" . 
    "routeName" (printf "%s-api" $temporalName)
    "enabled" (.Values.temporal.gateway.api.authBypass.enabled | default false)
    "paths" (.Values.temporal.gateway.api.authBypass.paths | default list)
) }}
{{- end }}
{{- end }}

# Config Store API Auth Bypass SecurityPolicy
{{- if .Values.configStore.enabled }}
{{- if .Values.configStore.gateway.api.authBypass }}
{{- $configStoreName := include "nv-config-manager.componentName" (dict "root" . "component" "config-store") }}
{{- include "nv-config-manager.authBypassSecurityPolicy" (dict 
    "root" . 
    "routeName" (printf "%s-api" $configStoreName)
    "enabled" (.Values.configStore.gateway.api.authBypass.enabled | default false)
    "paths" (.Values.configStore.gateway.api.authBypass.paths | default list)
) }}
{{- end }}
{{- end }}

