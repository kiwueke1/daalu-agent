#
# PodMonitor resources for Prometheus Operator
# Requires: --enable-monitoring flag and Prometheus Operator CRDs installed
#
# Service-specific configuration (selectors, ports, paths) is defined here.
# Each probe is enabled when monitoring.probes.enabled AND the target service is enabled.
# Each PodMonitor is enabled when monitoring.podMonitors.enabled AND the target service is enabled.
#
# =============================================================================
# Probe Resources (Blackbox Exporter)
# =============================================================================
# These probes work with both Envoy Gateway (ingress.type=envoyGateway) and
# nginx Ingress (ingress.type=ingressNginx). They use the same hostnames
# configured in each service's gateway.hostname setting.
#
# The scheme (http/https) is determined by:
#   1. monitoring.probes.scheme if explicitly set
#   2. Otherwise, auto-detected from gateway.certificates.enabled
# =============================================================================
{{- if and .Values.monitoring .Values.monitoring.enabled }}

{{- $namespace := .Values.global.namespace }}
{{- $scrapeInterval := .Values.monitoring.podMonitors.interval | default "30s" }}
{{- $scrapeTimeout := .Values.monitoring.podMonitors.scrapeTimeout | default "10s" }}
{{- $monitoringCRLabels := .Values.global.customLabels | default dict }}

{{- /* Component name helpers - must match the naming in deployment templates */}}
{{- $renderName := include "nv-config-manager.componentName" (dict "root" . "component" "render") }}
{{- $ztpName := include "nv-config-manager.componentName" (dict "root" . "component" "ztp") }}
{{- $dhcpName := include "nv-config-manager.componentName" (dict "root" . "component" "dhcp") }}
{{- $configStoreName := include "nv-config-manager.componentName" (dict "root" . "component" "config-store") }}
{{- $temporalName := include "nv-config-manager.componentName" (dict "root" . "component" "temporal") }}
{{- $nautobotName := include "nv-config-manager.componentName" (dict "root" . "component" "nautobot") }}
{{- $uiName := include "nv-config-manager.componentName" (dict "root" . "component" "ui") }}

{{- /* Determine ingress type and scheme for probes */}}
{{- $ingressType := .Values.ingress.type | default "envoyGateway" }}
{{- $hasIngress := or (eq $ingressType "envoyGateway") (eq $ingressType "ingressNginx") }}
{{- $probeScheme := .Values.monitoring.probes.scheme | default (ternary "https" "http" .Values.gateway.certificates.enabled) }}

{{- /*
  Optional static `jobName` prefix prepended to every Probe resource's
  `jobName`. The final `job` label is `<jobNamePrefix><componentName>-probe`
  (e.g. with `jobNamePrefix: ""` and release `nv-config-manager-example01` the
  render probe is `nv-config-manager-example01-render-probe`). Override
  per-environment to match site-level alerting / dashboard regexes.
*/}}
{{- $probeJobPrefix := .Values.monitoring.probes.jobNamePrefix | default "" }}

{{- if and .Values.monitoring.probes .Values.monitoring.probes.enabled .Values.monitoring.probes.blackboxExporterUrl $hasIngress }}
{{- /* Render Service Probe */}}
{{- if and .Values.monitoring.probes.enabled .Values.renderService.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: {{ $renderName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nv-config-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: render-service
    {{- with $monitoringCRLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  interval: 30s
  module: http_2xx
  jobName: {{ $probeJobPrefix }}{{ $renderName }}-probe
  prober:
    scheme: {{ $probeScheme }}
    url: {{ .Values.monitoring.probes.blackboxExporterUrl }}
  targets:
    staticConfig:
      static:
      - {{ $probeScheme }}://{{ tpl .Values.renderService.gateway.hostname . }}/healthcheck
{{- end }}

{{- /* Network ZTP Probe */}}
{{- if and .Values.monitoring.probes.enabled .Values.networkZtp.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
