    {{- end }}
spec:
  interval: 30s
  module: http_2xx
  jobName: {{ $probeJobPrefix }}{{ $ztpName }}-probe
  prober:
    scheme: https
    url: {{ .Values.monitoring.probes.blackboxExporterUrl }}
  targets:
    staticConfig:
      static:
      - {{ $probeScheme }}://{{ tpl .Values.networkZtp.gateway.hostname . }}/healthcheck
{{- end }}

