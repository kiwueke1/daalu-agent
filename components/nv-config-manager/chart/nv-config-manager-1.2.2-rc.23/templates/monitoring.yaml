{{- end }}{{- /* end hasIngress check */}}

{{- if and .Values.monitoring.podMonitors .Values.monitoring.podMonitors.enabled }}
{{- /* Render Service PodMonitor */}}
{{- if and .Values.monitoring.podMonitors.enabled .Values.renderService.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $renderName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "nv-config-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: render-service
    {{- with $monitoringCRLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- include "nv-config-manager.podTargetLabels" . | nindent 2 }}
  namespaceSelector:
    matchNames:
      - {{ $namespace }}
  selector:
    matchLabels:
      app: {{ $renderName }}
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: {{ $scrapeInterval }}
      scrapeTimeout: {{ $scrapeTimeout }}
      {{- if .Values.global.customLabels }}
      metricRelabelings:
        {{- include "nv-config-manager.podMonitorMetricRelabelings" . | nindent 8 }}
      {{- end }}
    - port: metrics
      path: /metrics
      interval: {{ $scrapeInterval }}
      scrapeTimeout: {{ $scrapeTimeout }}
      {{- if .Values.global.customLabels }}
      metricRelabelings:
        {{- include "nv-config-manager.podMonitorMetricRelabelings" . | nindent 8 }}
      {{- end }}
{{- end }}

