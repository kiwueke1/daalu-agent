# Fully-pinned dependency lock for the daalu-automation image.
#
# DO NOT hand-edit. Regenerate after changing pyproject.toml deps with:
#   docker run --rm -v "$PWD":/w -w /w python:3.11-slim-bookworm bash -c \
#     "apt-get update && apt-get install -y --no-install-recommends build-essential libpq-dev curl && \
#      pip install uv && uv pip compile pyproject.toml --extra dev --python-version 3.11 \
#      --no-header -o requirements.lock"
#
# Why this exists: the Dockerfile installs from this file (not the open
# `>=` ranges in pyproject) so a rebuild can never silently float a
# transitive dep — see the 2026-06-15 fastapi 0.137 _IncludedRouter
# outage. pyproject.toml stays the source of truth for direct deps.

