# Daalu agent — one-command local stack.
#
#   cp .env.example .env      # edit your inference endpoint
#   docker compose up --build
#   open http://localhost:3000
#
# Services: postgres, redis, api, worker (Celery tasks), beat (scheduler),
# agents (the event-driven InfraAgent loop), executor (applies approved
# change-proposals on a dedicated queue), frontend (the Ops UI).
#
# All Python services share one image and differ only by command. Your
# kubeconfig is mounted read-only so the agent can operate your cluster.

x-agent-base: &agent-base
  build:
    context: .
    dockerfile: Dockerfile
  image: daalu-agent:local
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  # Lets containers reach an Ollama/vLLM server running on the host via
  # http://host.docker.internal:<port> (Linux needs this mapping).
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    # Mount your kubeconfig read-only so the kubectl tools can operate the
    # cluster. Comment out if you only want cloud/SSH device tools.
    - ${HOME}/.kube:/home/daalu/.kube:ro
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: daalu_agent
      POSTGRES_USER: daalu
      POSTGRES_PASSWORD: daalu_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daalu -d daalu_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    <<: *agent-base
    command: ["daalu", "server", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"

  worker:
    <<: *agent-base
    command: ["daalu", "worker", "--concurrency", "4"]

  beat:
    <<: *agent-base
    command: ["daalu", "beat"]

  agents:
    <<: *agent-base
    command: ["daalu", "agents"]

  executor:
    <<: *agent-base
    command: ["daalu", "executor"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: daalu-agent-ui:local
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  # ── Optional: bundled CPU Ollama ───────────────────────────────────────────
  # Enable with:  docker compose --profile ollama up
  # Then set LLM_BASE_URL=http://ollama:11434/v1 in .env. For GPU, run Ollama
  # or vLLM on the host instead (far faster) and point LLM_BASE_URL there.
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

volumes:
  pgdata:
  ollama:
