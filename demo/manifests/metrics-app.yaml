# A second demo app that emits real Prometheus metrics, so we can fire a
# *metrics-based* alert (high error rate) — distinct from the dummy-app's
# up/down (replicas) alert.
#
# The app is a tiny pure-stdlib Python service (no image to build, no pip): a
# background loop "serves requests" by bumping app_requests_total ~5/s, and when
# ERROR_MODE=true it also bumps app_errors_total. /metrics exposes both counters.
# Flip ERROR_MODE on (demo/break.sh errors) and the error rate climbs, firing
# HighErrorRate. Roll back to fix.
apiVersion: v1
kind: ConfigMap
metadata:
  name: metrics-app-code
  namespace: daalu-demo
data:
  app.py: |
    import os, threading, time
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    requests_total = 0
    errors_total = 0
    lock = threading.Lock()

    def worker():
        global requests_total, errors_total
        while True:
            with lock:
                requests_total += 1
                if os.environ.get("ERROR_MODE", "false").lower() == "true":
                    errors_total += 1
            time.sleep(0.2)  # ~5 simulated requests/sec

    class H(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/metrics":
                with lock:
                    body = (
                        "# HELP app_requests_total Total simulated requests\n"
                        "# TYPE app_requests_total counter\n"
                        f"app_requests_total {requests_total}\n"
                        "# HELP app_errors_total Total simulated errored requests\n"
                        "# TYPE app_errors_total counter\n"
                        f"app_errors_total {errors_total}\n"
                    ).encode()
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
            else:
                self.send_response(200); self.end_headers(); self.wfile.write(b"ok")
        def log_message(self, *a):
            pass

    threading.Thread(target=worker, daemon=True).start()
    ThreadingHTTPServer(("0.0.0.0", 8000), H).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-app
  namespace: daalu-demo
  labels: { app: metrics-app }
spec:
  replicas: 1
  selector:
    matchLabels: { app: metrics-app }
  template:
    metadata:
      labels: { app: metrics-app }
    spec:
      containers:
        - name: app
          image: python:3.12-alpine
          command: ["python", "/app/app.py"]
          env:
            - { name: ERROR_MODE, value: "false" }   # break.sh flips this to "true"
          ports:
            - { containerPort: 8000, name: http }
          readinessProbe:
            httpGet: { path: /metrics, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 100m, memory: 64Mi }
          volumeMounts:
            - { name: code, mountPath: /app }
      volumes:
        - name: code
          configMap: { name: metrics-app-code }
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-app
  namespace: daalu-demo
  labels: { app: metrics-app }
spec:
  selector: { app: metrics-app }
  ports:
    - { name: http, port: 8000, targetPort: http }
---
# Tell Prometheus to scrape the app. The release label makes the
# kube-prometheus-stack operator adopt this ServiceMonitor.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: metrics-app
  namespace: daalu-demo
  labels: { release: monitoring }
spec:
  selector:
    matchLabels: { app: metrics-app }
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: metrics-app-rules
  namespace: daalu-demo
  labels: { release: monitoring }
spec:
  groups:
    - name: metrics-app.rules
      rules:
        - alert: HighErrorRate
          expr: rate(app_errors_total{job="metrics-app"}[2m]) > 0.5
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "metrics-app error rate is high"
            description: >-
              metrics-app is returning errors at an elevated rate
              (app_errors_total is climbing). This started after a recent change
              that put the app into a failing mode. Identify the change and roll
              it back to restore a healthy error rate.
            runbook: >-
              kubectl -n daalu-demo describe deploy/metrics-app;
              kubectl -n daalu-demo rollout history deploy/metrics-app;
              kubectl -n daalu-demo rollout undo deploy/metrics-app
